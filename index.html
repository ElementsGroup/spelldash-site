    // ---- Start a prep game session ----

    function startPrepGame(mode) {
      var p = activeProfile();
      if (!p) return;
      var rounds = [];
      var totalRounds = 10;

      if (mode === 'letters') {
        var pool = shuffle(PREP_LETTERS.slice());
        for (var i = 0; i < totalRounds; i++) {
          var target = pool[i % pool.length];
          var distractors = [];
          while (distractors.length < 3) {
            var d = pick(PREP_LETTERS);
            if (d !== target && distractors.indexOf(d) === -1) distractors.push(d);
          }
          var opts = shuffle([target].concat(distractors));
          rounds.push({ target: target, options: opts, speakText: target });
        }
      }

      if (mode === 'numbers') {
        var nums = [];
        for (var n = 1; n <= 20; n++) nums.push(n);
        var numPool = shuffle(nums);
        for (var i = 0; i < totalRounds; i++) {
          var target = numPool[i % numPool.length];
          var distractors = [];
          while (distractors.length < 3) {
            var d = Math.floor(Math.random() * 20) + 1;
            if (d !== target && distractors.indexOf(d) === -1) distractors.push(d);
          }
          var opts = shuffle([target].concat(distractors));
          rounds.push({ target: target, options: opts, speakText: String(target) });
        }
      }

      if (mode === 'spelling') {
        var wordPool = shuffle(PREP_SPELL_WORDS.slice());
        totalRounds = Math.min(6, wordPool.length);
        for (var i = 0; i < totalRounds; i++) {
          rounds.push({ wordObj: wordPool[i] });
        }
      }

      if (mode === 'counting') {
        for (var i = 0; i < totalRounds; i++) {
          var count = Math.floor(Math.random() * 10) + 1;
          var emoji = pick(PREP_COUNT_EMOJIS);
          var distractors = [];
          while (distractors.length < 3) {
            var d = Math.floor(Math.random() * 10) + 1;
            if (d !== count && distractors.indexOf(d) === -1) distractors.push(d);
          }
          var opts = shuffle([count].concat(distractors));
          var emojiStr = '';
          for (var j = 0; j < count; j++) emojiStr += emoji + ' ';
          rounds.push({ target: count, options: opts, emoji: emoji, emojiStr: emojiStr.trim(), speakText: 'How many can you count?' });
        }
      }

      if (mode === 'sounds') {
        var soundPool = shuffle(PREP_SOUND_WORDS.slice());
        for (var i = 0; i < totalRounds; i++) {
          var item = soundPool[i % soundPool.length];
          var firstLetter = item.word.charAt(0).toUpperCase();
          var distractors = [];
          while (distractors.length < 3) {
            var d = pick(PREP_LETTERS);
            if (d !== firstLetter && distractors.indexOf(d) === -1) distractors.push(d);
          }
          var opts = shuffle([firstLetter].concat(distractors));
          rounds.push({ target: firstLetter, options: opts, word: item.word, emoji: item.emoji, speakText: 'What does ' + item.word + ' start with?' });
        }
      }

      if (mode === 'numtap') {
        totalRounds = 1;
        rounds.push({ type: 'numtap' });
      }

      if (mode === 'abcorder') {
        totalRounds = 1;
        rounds.push({ type: 'abcorder' });
      }

      if (mode === 'pairs') {
        totalRounds = 1;
        rounds.push({ type: 'pairs' });
      }

      prepSession = {
        mode: mode,
        rounds: rounds,
        index: 0,
        correct: 0,
        coins: 0,
        totalRounds: rounds.length
      };

      renderPrepRound();
    }

    // ---- Render current prep round ----

    function renderPrepRound() {
      if (!prepSession) return;
      if (prepSession.index >= prepSession.totalRounds) {
        renderPrepDone();
        return;
      }

      var mode = prepSession.mode;

      if (mode === 'spelling') {
        renderSpellingRound();
        return;
      }

      if (mode === 'numtap') {
        renderNumTapGame();
        return;
      }

      if (mode === 'abcorder') {
        renderAbcOrderGame();
        return;
      }

      if (mode === 'pairs') {
        renderPairsGame();
        return;
      }

      var round = prepSession.rounds[prepSession.index];
      var container = $('s-prep-game');
      container.className = 'screen active';

      var progressHtml = '<div class="prep-progress">';
      for (var i = 0; i < prepSession.totalRounds; i++) {
        var cls = 'prep-dot';
        if (i < prepSession.index) cls += ' done';
        if (i === prepSession.index) cls += ' active';
        progressHtml += '<div class="' + cls + '"></div>';
      }
      progressHtml += '</div>';

      var promptText = '';
      var targetDisplay = '';

      if (mode === 'letters') {
        promptText = 'Find the letter';
        targetDisplay = '<div class="prep-target">' + escapeHtml(round.target) + '</div>';
      } else if (mode === 'numbers') {
        promptText = 'Find the number';
        targetDisplay = '<div class="prep-target">' + round.target + '</div>';
      } else if (mode === 'counting') {
        promptText = 'How many ' + round.emoji + '?';
        targetDisplay = '<div class="count-emojis">' + round.emojiStr + '</div>';
      } else if (mode === 'sounds') {
        promptText = 'What does ' + round.emoji + ' ' + round.word + ' start with?';
        targetDisplay = '<div class="prep-target">' + round.emoji + '</div>';
      }

      var buttonsHtml = '<div class="prep-btn-grid">';
      for (var i = 0; i < round.options.length; i++) {
        buttonsHtml += '<button class="prep-btn" data-answer="' + escapeHtml(String(round.options[i])) + '">' + escapeHtml(String(round.options[i])) + '</button>';
      }
      buttonsHtml += '</div>';

      container.innerHTML =
        '<button class="btn-back" data-back="s-prep">← Back</button>' +
        '<div class="prep-card">' +
          progressHtml +
          '<div class="prep-score">' + prepSession.correct + ' / ' + prepSession.totalRounds + ' correct</div>' +
          '<div class="prep-prompt">' + promptText + '</div>' +
          '<span class="prep-speaker" id="prep-speak">🔊</span>' +
          targetDisplay +
          '<div id="prep-feedback"></div>' +
          buttonsHtml +
        '</div>';

      // Show the screen
      var screens = document.querySelectorAll('.screen');
      for (var i = 0; i < screens.length; i++) {
        screens[i].classList.toggle('active', screens[i].id === 's-prep-game');
      }

      // Speak
      setTimeout(function() {
        if (mode === 'letters') speak('Find the letter ' + round.target, 0.75);
        else if (mode === 'numbers') speak('Find the number ' + round.speakText, 0.75);
        else if (mode === 'counting') speak(round.speakText, 0.75);
        else if (mode === 'sounds') speak(round.speakText, 0.75);
      }, 400);

      // Speaker button
      $('prep-speak').addEventListener('click', function() {
        if (mode === 'letters') speak('Find the letter ' + round.target, 0.75);
        else if (mode === 'numbers') speak('Find the number ' + round.speakText, 0.75);
        else if (mode === 'counting') speak(round.speakText, 0.75);
        else if (mode === 'sounds') speak(round.speakText, 0.75);
      });

      // Answer buttons
      var answered = false;
      var allBtns = container.querySelectorAll('.prep-btn');
      for (var bi = 0; bi < allBtns.length; bi++) {
        (function(btn) {
          btn.addEventListener('click', function() {
            if (answered) return;
            answered = true;

            var selected = btn.getAttribute('data-answer');
            var isCorrect = (String(selected) === String(round.target));

            for (var j = 0; j < allBtns.length; j++) {
              allBtns[j].classList.add('disabled');
              if (String(allBtns[j].getAttribute('data-answer')) === String(round.target)) {
                allBtns[j].classList.add('correct');
              } else if (allBtns[j] === btn && !isCorrect) {
                allBtns[j].classList.add('wrong');
              }
            }

            var fb = $('prep-feedback');
            if (isCorrect) {
              prepSession.correct++;
              prepSession.coins++;
              fb.innerHTML = '<div class="prep-feedback">🎉</div>';
              speak(pick(PREP_CHEERS).replace(/[^a-zA-Z ]/g, ''), 0.85);
            } else {
              fb.innerHTML = '<div class="prep-feedback">😊</div><div style="color:#888;font-size:14px;">It was ' + escapeHtml(String(round.target)) + '</div>';
              speak('The answer is ' + round.target, 0.75);
            }

            var scoreEl = container.querySelector('.prep-score');
            if (scoreEl) scoreEl.textContent = prepSession.correct + ' / ' + prepSession.totalRounds + ' correct';

            setTimeout(function() {
              prepSession.index++;
              renderPrepRound();
            }, 1600);
          });
        })(allBtns[bi]);
      }
    }

    // ---- Spelling round ----

    function renderSpellingRound() {
      if (prepSession.index >= prepSession.totalRounds) {
        renderPrepDone();
        return;
      }

      var round = prepSession.rounds[prepSession.index];
      var wordObj = round.wordObj;
      var letters = wordObj.word.split('');
      var container = $('s-prep-game');

      var screens = document.querySelectorAll('.screen');
      for (var i = 0; i < screens.length; i++) {
        screens[i].classList.toggle('active', screens[i].id === 's-prep-game');
      }

      var progressHtml = '<div class="prep-progress">';
      for (var i = 0; i < prepSession.totalRounds; i++) {
        var cls = 'prep-dot';
        if (i < prepSession.index) cls += ' done';
        if (i === prepSession.index) cls += ' active';
        progressHtml += '<div class="' + cls + '"></div>';
      }
      progressHtml += '</div>';

      var slotsHtml = '<div class="spell-word-display" id="spell-slots">';
      for (var i = 0; i < letters.length; i++) {
        slotsHtml += '<div class="spell-slot" data-idx="' + i + '"></div>';
      }
      slotsHtml += '</div>';

      // Build letter bank: all letters of the word + some random extras
      var bankLetters = letters.slice();
      var extraCount = Math.max(2, 6 - letters.length);
      while (bankLetters.length < letters.length + extraCount) {
        var r = pick(PREP_LETTERS);
        if (bankLetters.indexOf(r) === -1 || Math.random() > 0.5) bankLetters.push(r);
      }
      bankLetters = shuffle(bankLetters);

      var bankHtml = '<div class="spell-bank" id="spell-bank">';
      for (var i = 0; i < bankLetters.length; i++) {
        bankHtml += '<button class="spell-letter" data-letter="' + bankLetters[i] + '" data-bi="' + i + '">' + bankLetters[i] + '</button>';
      }
      bankHtml += '</div>';

      container.innerHTML =
        '<button class="btn-back" data-back="s-prep">← Back</button>' +
        '<div class="prep-card">' +
          progressHtml +
          '<div class="prep-score">' + prepSession.correct + ' / ' + prepSession.totalRounds + ' correct</div>' +
          '<div class="prep-prompt">Spell the word</div>' +
          '<span class="prep-speaker" id="prep-speak">🔊</span>' +
          '<div class="prep-target" style="font-size:40px;">' + escapeHtml(wordObj.word) + '</div>' +
          '<div class="spell-hint">' + wordObj.hint + '</div>' +
          slotsHtml +
          '<div id="prep-feedback"></div>' +
          bankHtml +
        '</div>';

      setTimeout(function() {
        speak('Spell ' + wordObj.word, 0.7);
      }, 400);

      $('prep-speak').addEventListener('click', function() {
        speak('Spell ' + wordObj.word, 0.7);
      });

      var currentPos = 0;
      var mistakes = 0;
      var slots = container.querySelectorAll('.spell-slot');
      if (slots.length > 0) slots[0].classList.add('active');

      container.addEventListener('click', function(ev) {
        var letterBtn = ev.target.closest('.spell-letter');
        if (!letterBtn || letterBtn.classList.contains('used')) return;
        if (currentPos >= letters.length) return;

        var tapped = letterBtn.getAttribute('data-letter');
        var expected = letters[currentPos];

        if (tapped === expected) {
          letterBtn.classList.add('used', 'correct-pop');
          slots[currentPos].textContent = tapped;
          slots[currentPos].classList.add('filled');
          slots[currentPos].classList.remove('active');
          speak(tapped, 0.9);
          currentPos++;

          if (currentPos < letters.length) {
            slots[currentPos].classList.add('active');
          }

          if (currentPos >= letters.length) {
            var fb = $('prep-feedback');
            if (mistakes === 0) {
              prepSession.correct++;
              prepSession.coins += 2;
              fb.innerHTML = '<div class="prep-feedback">🎉</div>';
              speak('You spelled ' + wordObj.word + '! ' + pick(PREP_CHEERS).replace(/[^a-zA-Z ]/g, ''), 0.8);
            } else {
              prepSession.coins++;
              fb.innerHTML = '<div class="prep-feedback">👏</div>';
              speak('You spelled ' + wordObj.word, 0.8);
            }
            var scoreEl = container.querySelector('.prep-score');
            if (scoreEl) scoreEl.textContent = prepSession.correct + ' / ' + prepSession.totalRounds + ' correct';

            setTimeout(function() {
              prepSession.index++;
              renderPrepRound();
            }, 2000);
          }
        } else {
          mistakes++;
          slots[currentPos].classList.add('wrong-shake');
          setTimeout(function() {
            slots[currentPos].classList.remove('wrong-shake');
          }, 500);
          speak('Try again', 0.8);
        }
      });
    }

    // ---- Prep done screen ----

    function isSchoolAge(p) {
      return p && p.name && p.name.toLowerCase() === 'emelia';
    }

    function alreadyPlayedToday(p, source) {
      var today = todayKey();
      var history = p.coinHistory || [];
      for (var i = 0; i < history.length; i++) {
        if (history[i].date === today && history[i].amount > 0) {
          if (source.indexOf('prep-') === 0 && history[i].source === source) return true;
          if (source.indexOf('prep-') !== 0 && history[i].soundId === source) return true;
        }
      }
      return false;
    }

    function findUnplayedSound(p) {
      var today = todayKey();
      var played = {};
      var history = p.coinHistory || [];
      for (var i = 0; i < history.length; i++) {
        if (history[i].date === today && history[i].soundId) played[history[i].soundId] = true;
      }
      var currentIdx = -1;
      for (var i = 0; i < WEEKS.length; i++) {
        if (WEEKS[i].soundId === (gameSession && gameSession.soundId)) { currentIdx = i; break; }
      }
      for (var offset = 1; offset < WEEKS.length; offset++) {
        var nextIdx = (currentIdx + offset) % WEEKS.length;
        if (!WEEKS[nextIdx].comingSoon && !played[WEEKS[nextIdx].soundId]) return WEEKS[nextIdx].soundId;
      }
      for (var offset = 1; offset < WEEKS.length; offset++) {
        var prevIdx = (currentIdx - offset + WEEKS.length) % WEEKS.length;
        if (!WEEKS[prevIdx].comingSoon && !played[WEEKS[prevIdx].soundId]) return WEEKS[prevIdx].soundId;
      }
      return null;
    }

    // ---- Number Tap: tap 1-20 in order ----
    function renderNumTapGame() {
      var container = $('s-prep-game');
      var screens = document.querySelectorAll('.screen');
      for (var i = 0; i < screens.length; i++) screens[i].classList.toggle('active', screens[i].id === 's-prep-game');

      var maxNum = 20;
      var nextNum = 1;
      var nums = [];
      for (var n = 1; n <= maxNum; n++) nums.push(n);
      nums = shuffle(nums);

      var html = '<button class="btn-back" data-back="s-prep">← Back</button>' +
        '<div class="prep-card">' +
        '<div class="prep-prompt">Tap the numbers in order: 1 to 20</div>' +
        '<div id="numtap-status" style="font-size:18px;font-weight:700;color:var(--pu3);margin:8px 0;">Next: 1</div>' +
        '<div class="prep-btn-grid" id="numtap-grid" style="grid-template-columns:repeat(5,1fr);">';
      for (var i = 0; i < nums.length; i++) {
        html += '<button class="prep-btn numtap-btn" data-num="' + nums[i] + '" style="font-size:20px;padding:14px 0;">' + nums[i] + '</button>';
      }
      html += '</div></div>';
      container.innerHTML = html;

      speak('Tap the numbers in order, starting from one', 0.75);

      container.querySelectorAll('.numtap-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var val = parseInt(btn.getAttribute('data-num'), 10);
          if (val === nextNum) {
            btn.style.background = 'var(--gn2)';
            btn.style.color = '#fff';
            btn.style.pointerEvents = 'none';
            btn.style.transform = 'scale(0.9)';
            nextNum++;
            prepSession.correct++;
            if (nextNum > maxNum) {
              prepSession.totalRounds = maxNum;
              $('numtap-status').textContent = 'Well done!';
              prepSession.coins = 10;
              setTimeout(function() { renderPrepDone(); }, 800);
            } else {
              $('numtap-status').textContent = 'Next: ' + nextNum;
            }
          } else {
            btn.style.background = '#FFB3B3';
            setTimeout(function() { btn.style.background = ''; }, 400);
          }
        });
      });
    }

    // ---- ABC Order: tap A-Z in order ----
    function renderAbcOrderGame() {
      var container = $('s-prep-game');
      var screens = document.querySelectorAll('.screen');
      for (var i = 0; i < screens.length; i++) screens[i].classList.toggle('active', screens[i].id === 's-prep-game');

      var letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
      var shuffled = shuffle(letters.slice());
      var nextIdx = 0;

      var html = '<button class="btn-back" data-back="s-prep">← Back</button>' +
        '<div class="prep-card">' +
        '<div class="prep-prompt">Tap the letters in order: A to Z</div>' +
        '<div id="abc-status" style="font-size:18px;font-weight:700;color:var(--pu3);margin:8px 0;">Next: A</div>' +
        '<div class="prep-btn-grid" id="abc-grid" style="grid-template-columns:repeat(6,1fr);">';
      for (var i = 0; i < shuffled.length; i++) {
        html += '<button class="prep-btn abc-btn" data-letter="' + shuffled[i] + '" style="font-size:18px;padding:12px 0;">' + shuffled[i] + '</button>';
      }
      html += '</div></div>';
      container.innerHTML = html;

      speak('Tap the letters in order, starting from A', 0.75);

      container.querySelectorAll('.abc-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var val = btn.getAttribute('data-letter');
          if (val === letters[nextIdx]) {
            btn.style.background = 'var(--gn2)';
            btn.style.color = '#fff';
            btn.style.pointerEvents = 'none';
            btn.style.transform = 'scale(0.9)';
            nextIdx++;
            prepSession.correct++;
            if (nextIdx >= letters.length) {
              prepSession.totalRounds = letters.length;
              $('abc-status').textContent = 'Amazing!';
              prepSession.coins = 10;
              setTimeout(function() { renderPrepDone(); }, 800);
            } else {
              $('abc-status').textContent = 'Next: ' + letters[nextIdx];
            }
          } else {
            btn.style.background = '#FFB3B3';
            setTimeout(function() { btn.style.background = ''; }, 400);
          }
        });
      });
    }

    // ---- Matching Pairs: memory card flip ----
    function renderPairsGame() {
      var container = $('s-prep-game');
      var screens = document.querySelectorAll('.screen');
      for (var i = 0; i < screens.length; i++) screens[i].classList.toggle('active', screens[i].id === 's-prep-game');

      var pairItems = shuffle([
        { id: 'A', display: 'A' }, { id: 'B', display: 'B' },
        { id: 'C', display: 'C' }, { id: '1', display: '1' },
        { id: '2', display: '2' }, { id: '3', display: '3' }
      ]);
      var cards = [];
      for (var i = 0; i < pairItems.length; i++) {
        cards.push({ id: pairItems[i].id, display: pairItems[i].display, idx: cards.length });
        cards.push({ id: pairItems[i].id, display: pairItems[i].display, idx: cards.length });
      }
      cards = shuffle(cards);
      var totalPairs = pairItems.length;
      var matchedPairs = 0;
      var flipped = [];
      var locked = false;

      var html = '<button class="btn-back" data-back="s-prep">← Back</button>' +
        '<div class="prep-card">' +
        '<div class="prep-prompt">Flip cards to find matching pairs!</div>' +
        '<div id="pairs-status" style="font-size:16px;color:var(--pu3);margin:8px 0;">Pairs found: 0 / ' + totalPairs + '</div>' +
        '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:320px;margin:0 auto;" id="pairs-grid">';
      for (var i = 0; i < cards.length; i++) {
        html += '<button class="prep-btn pair-card" data-pidx="' + i + '" data-pid="' + cards[i].id + '" style="font-size:24px;padding:18px 0;min-height:60px;background:var(--pu2);color:var(--pu2);">?</button>';
      }
      html += '</div></div>';
      container.innerHTML = html;

      speak('Flip the cards to find matching pairs', 0.75);

      container.querySelectorAll('.pair-card').forEach(function(btn) {
        btn.addEventListener('click', function() {
          if (locked) return;
          var idx = parseInt(btn.getAttribute('data-pidx'), 10);
          var id = btn.getAttribute('data-pid');
          if (btn.style.pointerEvents === 'none') return;
          if (flipped.length >= 2) return;
          if (flipped.length === 1 && flipped[0].idx === idx) return;

          btn.textContent = cards[idx].display;
          btn.style.color = 'var(--pu3)';
          btn.style.background = '#fff';
          flipped.push({ idx: idx, id: id, btn: btn });

          if (flipped.length === 2) {
            locked = true;
            if (flipped[0].id === flipped[1].id) {
              matchedPairs++;
              prepSession.correct++;
              flipped[0].btn.style.background = 'var(--gn2)';
              flipped[0].btn.style.color = '#fff';
              flipped[0].btn.style.pointerEvents = 'none';
              flipped[1].btn.style.background = 'var(--gn2)';
              flipped[1].btn.style.color = '#fff';
              flipped[1].btn.style.pointerEvents = 'none';
              $('pairs-status').textContent = 'Pairs found: ' + matchedPairs + ' / ' + totalPairs;
              flipped = [];
              locked = false;
              if (matchedPairs >= totalPairs) {
                prepSession.totalRounds = totalPairs;
                prepSession.coins = 10;
                setTimeout(function() { renderPrepDone(); }, 800);
              }
            } else {
              var f0 = flipped[0].btn;
              var f1 = flipped[1].btn;
              setTimeout(function() {
                f0.textContent = '?';
                f0.style.color = 'var(--pu2)';
                f0.style.background = 'var(--pu2)';
                f1.textContent = '?';
                f1.style.color = 'var(--pu2)';
                f1.style.background = 'var(--pu2)';
                flipped = [];
                locked = false;
              }, 800);
            }
          }
        });
      });
    }

    function renderPrepDone() {
      var p = activeProfile();
      if (!p) return;
      var container = $('s-prep-game');

      var pct = prepSession.totalRounds > 0 ? Math.round((prepSession.correct / prepSession.totalRounds) * 100) : 0;
      var starCount = pct >= 90 ? 3 : (pct >= 60 ? 2 : 1);
      var starsStr = '';
      for (var i = 0; i < starCount; i++) starsStr += '⭐';

      var modeNames = { letters: 'Letter Match', numbers: 'Number Match', spelling: 'Spell It', counting: 'Counting', sounds: 'First Sound', numtap: 'Number Tap', abcorder: 'ABC Order', pairs: 'Matching Pairs' };
      var modeName = modeNames[prepSession.mode] || 'Prep Game';

      var coins = prepSession.coins;
      var today = todayKey();
      if (p.economy.dailyDate !== today) {
        p.economy.dailyDate = today;
        p.economy.dailyCoins = 0;
      }

      var blockedReason = '';
      var prepSource = 'prep-' + prepSession.mode;
      if (isSchoolAge(p)) {
        coins = 0;
        blockedReason = 'Prep games are for younger players — try spelling games for coins!';
      } else if (alreadyPlayedToday(p, prepSource)) {
        coins = 0;
        blockedReason = 'You already earned coins for this game today — try a different game!';
      }

      var cap = getDailyCap(p);
      var awarded = Math.min(coins, Math.max(0, cap - (p.economy.dailyCoins || 0)));
      p.economy.coins = (p.economy.coins || 0) + awarded;
      p.economy.dailyCoins = (p.economy.dailyCoins || 0) + awarded;
      p.economy.totalEarned = (p.economy.totalEarned || 0) + awarded;
      p.economy.gems = Math.max(p.economy.gems || 0, Math.floor((p.economy.totalEarned || 0) / 40));
      if (awarded > 0) {
        p.coinHistory.push({ date: today, amount: awarded, source: prepSource });
      }
      updateStreak(p);

      // Random gift chance for prep games too
      var prepDropChoices = null;
      if (pct >= 60) {
        var today2 = todayKey();
        var dropsToday2 = (p.drops || []).filter(function(d) { return d.date === today2; }).length;
        if (dropsToday2 < 2 && Math.random() < 0.5) {
          var ch3 = p.avatar.characterKey ? findCharacter(p.avatar.characterKey) : null;
          var w3 = ch3 ? ch3.world : 'beach';
          var pool3 = WORLD_PRIZE_POOLS[w3] || GIFT_POOL;
          var locked2 = pool3.filter(function(item) { return p.avatar.unlocked.indexOf(item) === -1; });
          if (locked2.length === 0) locked2 = GIFT_POOL.filter(function(item) { return p.avatar.unlocked.indexOf(item) === -1; });
          if (locked2.length > 0) {
            if (!p.drops) p.drops = [];
            p.drops.push({ date: today2, seen: false });
            prepDropChoices = shuffle(locked2.slice()).slice(0, 3);
          }
        }
      }
      saveActiveProfile();

      var msg = pct >= 90 ? 'Amazing work!' : (pct >= 60 ? 'Great effort!' : 'Good try!');

      var dropHtml2 = prepDropChoices
        ? '<div class="drop-modal" id="prep-drop-modal"><span class="drop-box">🎁</span>' +
          '<p style="font-weight:700;margin:4px 0;">Pick a prize!</p>' +
          '<div class="drop-emoji-row">' +
          prepDropChoices.map(function(e) {
            var display = itemIcon(e);
            var lbl = '<div style="font-size:10px;margin-top:2px;">' + itemLabel(e) + '</div>';
            return '<button class="drop-emoji-btn prep-drop-btn" data-emoji="' + e + '">' + display + lbl + '</button>';
          }).join('') +
          '</div></div>'
        : '';

      container.innerHTML =
        '<div class="prep-done-card">' +
          '<div class="prep-done-stars">' + starsStr + '</div>' +
          '<div class="prep-done-msg">' + msg + '</div>' +
          '<div style="font-size:15px;color:var(--pu);margin:4px 0;">' + modeName + '</div>' +
          '<div class="prep-done-detail">' + prepSession.correct + ' out of ' + prepSession.totalRounds + ' correct</div>' +
          (awarded > 0 ? '<div class="prep-coins-msg">🪙 +' + awarded + ' coins!</div>' : '') +
          (blockedReason ? '<div class="prep-done-detail" style="color:#E67E22;font-weight:600;">' + blockedReason + '</div>' : '') +
          (awarded < coins && !blockedReason ? '<div class="prep-done-detail" style="color:#aaa;">Daily coin cap reached</div>' : '') +
          dropHtml2 +
          '<div style="margin-top:20px;display:flex;gap:10px;justify-content:center;">' +
            '<button class="btn" id="prep-again">Play Again</button>' +
            '<button class="btn" id="prep-back" style="background:var(--pu);">Back</button>' +
          '</div>' +
        '</div>';

      speak(msg, 0.8);

      $('prep-again').addEventListener('click', function() {
        startPrepGame(prepSession.mode);
      });
      $('prep-back').addEventListener('click', function() {
        showScreen('s-avdisplay');
      });

      // Handle prep gift picks
      if (prepDropChoices) {
        container.querySelectorAll('.prep-drop-btn').forEach(function(btn) {
          btn.addEventListener('click', function() {
            var chosen = btn.getAttribute('data-emoji');
            var pp = activeProfile();
            if (pp) {
              migrateAvatar(pp);
              if (pp.avatar.unlocked.indexOf(chosen) === -1) pp.avatar.unlocked.push(chosen);
              var ch2 = pp.avatar.characterKey ? findCharacter(pp.avatar.characterKey) : null;
              var bgK2 = pp.avatar.background ? pp.avatar.background.replace('bg:', '') : null;
              var w2 = bgK2 || (ch2 ? ch2.world : 'beach');
              if (!pp.worldPrizes) pp.worldPrizes = {};
              if (!pp.worldPrizes[w2]) pp.worldPrizes[w2] = [];
              if (pp.worldPrizes[w2].indexOf(chosen) === -1) pp.worldPrizes[w2].push(chosen);
              saveActiveProfile();
            }
            var modal = $('prep-drop-modal');
            if (modal) {
              modal.innerHTML = '<span style="font-size:46px;">' + itemIcon(chosen) + '</span>' +
                '<p style="margin:6px 0 0;font-weight:800;">Prize unlocked! 🎉</p>';
            }
          });
        });
      }
    }

    // -----------------------------------
    // Boot
    // -----------------------------------
    showScreen('s-profiles');
  </script>
</body>
</html>
