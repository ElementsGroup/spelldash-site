    // ---- Small utilities ----------------------------------------

    function pad2(n) { return n < 10 ? '0' + n : '' + n; }

    function todayKey() {
      var d = new Date();
      return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
    }

    function repeatStr(str, n) {
      var out = '';
      for (var i = 0; i < n; i++) out += str;
      return out;
    }

    function activeProfile() { return state.profiles[state.activeIndex] || null; }
    function saveActiveProfile() { saveProfiles(state.profiles); }

    function shuffle(arr) {
      var a = arr.slice();
      for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var t = a[i]; a[i] = a[j]; a[j] = t;
      }
      return a;
    }

    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    function starsFromScore(correct, total) {
      if (correct >= total) return 3;
      if (correct >= Math.ceil(total * 0.7)) return 2;
      return 1;
    }

    function starsHtml(n) { return repeatStr('⭐', n) + repeatStr('☆', 3 - n); }

    // ---- Week helpers -------------------------------------------

    function currentWeekEntry() {
      var p = activeProfile();
      var wk = p && p.weekKey ? p.weekKey : null;
      // Match stored weekKey; fall back to first non-comingSoon week.
      var fallback = null;
      for (var i = 0; i < WEEKS.length; i++) {
        if (wk && WEEKS[i].weekKey === wk) return WEEKS[i];
        if (!fallback && !WEEKS[i].comingSoon) fallback = WEEKS[i];
      }
      return fallback || (WEEKS.length ? WEEKS[0] : null);
    }

    // ---- Word selection -----------------------------------------

    function selectWords(soundId, profileLevel, count) {
      var sound = SOUNDS[soundId];
      if (!sound) return [];
      var pool = sound.words.filter(function(w) {
        if (profileLevel === 'core')      return w.lv === 'core';
        if (profileLevel === 'challenge') return w.lv === 'core' || w.lv === 'challenge';
        return true;
      });
      // Merge custom words for this sound set.
      var p = activeProfile();
      var customs = (p && p.customWords || []).filter(function(cw) { return cw.soundId === soundId; });
      customs.forEach(function(cw) {
        if (!pool.find(function(w) { return w.w === cw.w; })) pool.push(cw);
      });
      return shuffle(pool).slice(0, count || 8);
    }

    // ---- Play hub rendering -------------------------------------

    function renderPlayHub() {
      var p = activeProfile();
      if (!p) return;
      var we = currentWeekEntry();

      var twSub = $('pt-thisweek-sub');
      var twBtn = $('pt-thisweek');
      if (twSub) twSub.textContent = we ? (we.emoji + ' ' + we.title) : 'No week set';
      if (twBtn) twBtn.disabled = !!(we && we.comingSoon);

      var probSub = $('pt-problems-sub');
      var probBtn = $('pt-problems');
      var probCount = (p.mistakes || []).length;
      if (probSub) {
        probSub.textContent = probCount > 0
          ? probCount + ' word' + (probCount !== 1 ? 's' : '') + ' to practise'
          : 'No problem words yet — keep playing!';
      }
      if (probBtn) probBtn.disabled = probCount === 0;

      var dadSub = $('pt-dad-sub');
      if (dadSub) {
        if (we && !we.comingSoon) dadSub.textContent = 'Fix Dad\'s ' + we.emoji + ' ' + we.title + ' mistakes';
        else dadSub.textContent = 'Fix Dad\'s spelling mistakes';
      }

      var bossSub = $('pt-boss-sub');
      if (bossSub) {
        var soundCount = Object.keys(SOUNDS).length;
        bossSub.textContent = 'Mix of all ' + soundCount + ' sound sets';
      }
    }

    // ---- Sound picker -------------------------------------------

    function renderSoundPicker() {
      var picker = $('sound-picker');
      if (!picker) return;
      picker.innerHTML = '<h3>Choose your sound</h3><div class="picker-grid" id="picker-grid"></div>';
      var grid = $('picker-grid');
      Object.keys(SOUNDS).forEach(function(id) {
        var s = SOUNDS[id];
        var card = document.createElement('button');
        card.className = 'picker-card';
        card.innerHTML =
          '<span class="pc-icon">' + s.emoji + '</span>' +
          '<span class="pc-name">' + escapeHtml(s.name) + '</span>';
        card.addEventListener('click', function() {
          hideSoundPicker();
          startGame(id, 'choose');
        });
        grid.appendChild(card);
      });
      picker.classList.remove('hidden');
      picker.scrollIntoView(true);
    }

    function hideSoundPicker() {
      var p = $('sound-picker');
      if (p) p.classList.add('hidden');
    }

    // ---- Start game ---------------------------------------------

    function startGame(soundId, mode, wordsOverride) {
      var p = activeProfile();
      if (!p) return;
      var sound = SOUNDS[soundId];
      if (!sound) { alert('This sound set is not available yet. Try another!'); return; }
      var levelForGame = (mode === 'thisweek') ? 'extension' : (p.level || 'core');
      var words = wordsOverride || selectWords(soundId, levelForGame, 8);
      if (!words.length) { alert('No words found for this level. Ask Dad to adjust Settings.'); return; }

      gameSession = {
        soundId: soundId, sound: sound, mode: mode,
        words: words, index: 0, phase: 'warmup',
        wrongThisWord: false, wrongCount: 0, correctFirst: 0,
        wrongWords: [], fixWords: [], fixIndex: 0,
        sessionCoins: 0, coinSeconds: 0,
        coinTimerInterval: null, lastActiveMs: Date.now(),
        sessionDate: todayKey()
      };
      showScreen('s-game');
      buildGameScreen();
    }

    // ---- Game screen scaffold -----------------------------------

    function buildGameScreen() {
      var container = $('s-game');
      container.innerHTML =
        '<button class="btn-back" id="game-back">← Quit</button>' +
        '<div id="phase-dots" class="phase-dots"></div>' +
        '<div id="game-content" class="game-content"></div>';

      $('game-back').addEventListener('click', function() {
        if (confirm('Quit this game? Your coins will still be saved.')) {
          stopCoinTimer();
          awardSessionCoins();
          showScreen('s-home');
        }
      });

      updatePhaseDots();
      var isAmb = AMBIGUOUS_IDS.indexOf(gameSession.soundId) > -1;
      if (isAmb && gameSession.sound.compare) {
        showComparePanel();
      } else {
        gameSession.phase = 'choose';
        updatePhaseDots();
        showChooseRound();
      }
    }

    function updatePhaseDots() {
      var el = $('phase-dots');
      if (!el) return;
      var order = ['warmup', 'choose', 'fix', 'done'];
      var cur = order.indexOf(gameSession.phase);
      el.innerHTML = order.map(function(ph, i) {
        var cls = 'phase-dot';
        if (i < cur)  cls += ' pd-done';
        if (i === cur) cls += ' pd-active';
        return '<span class="' + cls + '"></span>';
      }).join('');
    }

    // ---- Warmup — comparison panel ------------------------------

    function showComparePanel() {
      var c = gameSession.sound.compare;
      var content = $('game-content');

      var teamsHtml = gameSession.sound.teams.map(function(team) {
        var ti = gameSession.sound.teamInfo[team] || {};
        return '<div class="compare-team" style="background:' + ti.bg + ';color:' + ti.fg + '">' +
               '<strong>' + escapeHtml(ti.label || team) + '</strong>' +
               '<span>' + escapeHtml(ti.family || '') + '</span></div>';
      }).join('');

      var wordsHtml = (c.words || []).map(function(w) {
        return '<button class="compare-word" data-speak="' + escapeHtml(w) + '">🔊 ' + escapeHtml(w) + '</button>';
      }).join('');

      content.innerHTML =
        '<div class="compare-panel">' +
        '<p class="compare-cue">' + escapeHtml(gameSession.sound.cueLine || '') + '</p>' +
        '<div class="compare-title">' + escapeHtml(c.title) + '</div>' +
        '<div class="compare-teams">' + teamsHtml + '</div>' +
        '<div class="compare-words">' + wordsHtml + '</div>' +
        '<p class="compare-lesson">' + escapeHtml(c.lesson) + '</p>' +
        '<button class="btn" id="compare-go">Got it — let\'s play! →</button>' +
        '</div>';

      content.querySelectorAll('.compare-word').forEach(function(btn) {
        btn.addEventListener('click', function() { speak(btn.getAttribute('data-speak')); });
      });
      $('compare-go').addEventListener('click', function() {
        gameSession.phase = 'choose';
        updatePhaseDots();
        showChooseRound();
      });
    }

    // ---- makeWordDisplay ----------------------------------------
    // a_e / o_e: blank only the vowel, leave the silent e visible.
    // Other teams: replace the whole team string with ___.

    function makeWordDisplay(word, team) {
      if (team === 'a_e' || team === 'o_e') {
        var vowel = team.charAt(0);
        var idx = word.indexOf(vowel);
        if (idx > -1) {
          return escapeHtml(word.slice(0, idx)) +
                 '<span class="gap">_</span>' +
                 escapeHtml(word.slice(idx + 1));
        }
      }
      var pos = word.indexOf(team);
      if (pos > -1) {
        return escapeHtml(word.slice(0, pos)) +
               '<span class="gap">___</span>' +
               escapeHtml(word.slice(pos + team.length));
      }
      return '<span class="gap">___</span>';
    }

    // ---- Choose round -------------------------------------------

    function showChooseRound() {
      if (gameSession.index >= gameSession.words.length) {
        finishChoosePhase();
        return;
      }
      var entry = gameSession.words[gameSession.index];
      var sound = (entry._sid && SOUNDS[entry._sid]) ? SOUNDS[entry._sid] : gameSession.sound;
      gameSession.wrongThisWord = false;
      startCoinTimer();

      var progressPct = Math.round((gameSession.index / gameSession.words.length) * 100);
      var teams = sound.teams;
      var gridClass = teams.length >= 4 ? 'team-grid-2x2' : 'team-grid-row';
      var teamsHtml = teams.map(function(team) {
        var ti = sound.teamInfo[team] || {};
        return '<button class="team-btn" data-team="' + escapeHtml(team) + '"' +
               ' style="background:' + (ti.bg || '#eee') + ';color:' + (ti.fg || '#333') + '">' +
               '<strong>' + escapeHtml(ti.label || team) + '</strong>' +
               '<small>' + escapeHtml(ti.family || '') + '</small></button>';
      }).join('');

      var liveStars = gameSession.index > 0
        ? starsFromScore(gameSession.correctFirst, gameSession.index)
        : 3;

      var content = $('game-content');
      content.innerHTML =
        '<div class="game-header">' +
        '<div class="gh-sound">' + sound.emoji + ' ' + escapeHtml(sound.name) + '</div>' +
        '<div class="gh-right">' +
        '<div class="gh-stars">' + starsHtml(liveStars) + '</div>' +
        '<div class="coin-timer" id="coin-timer">🪙 +1 in <span id="ct-secs">60</span>s</div>' +
        '</div></div>' +
        '<div class="progress-track"><div class="progress-fill" style="width:' + progressPct + '%"></div></div>' +
        '<div class="score-badge">Word ' + (gameSession.index + 1) + ' of ' + gameSession.words.length + '</div>' +
        '<div id="feedback-area"></div>' +
        '<div class="game-card">' +
        '<div class="word-display">' + makeWordDisplay(entry.w, entry.team) + '</div>' +
        '<button class="speaker-btn" id="speak-btn">🔊</button>' +
        '<p class="word-hint">' + escapeHtml(entry.hint) + '</p>' +
        '<div class="' + gridClass + '">' + teamsHtml + '</div>' +
        '</div>' +
        '<div id="say-why-area"></div>';

      $('speak-btn').addEventListener('click', function() { speak(entry.w); });
      content.querySelectorAll('.team-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          handleChooseAnswer(btn.getAttribute('data-team'), entry);
        });
      });
      setTimeout(function() { speak(entry.w); }, 320);
    }

    function handleChooseAnswer(selectedTeam, entry) {
      pauseCoinTimer();
      document.querySelectorAll('.team-btn').forEach(function(b) { b.disabled = true; });

      if (selectedTeam === entry.team) {
        if (!gameSession.wrongThisWord) gameSession.correctFirst++;
        addToWall(entry);
        showFeedback(true, entry);
        setTimeout(function() { showSayWhy(entry); }, 900);
      } else {
        gameSession.wrongThisWord = true;
        gameSession.wrongCount++;
        if (!gameSession.wrongWords.find(function(w) { return w.w === entry.w; })) {
          gameSession.wrongWords.push(entry);
        }
        addToMistakes(entry);
        showFeedback(false, entry);
        setTimeout(function() { advanceChoiceWord(); }, 2600);
      }
    }

    function advanceChoiceWord() {
      gameSession.index++;
      showChooseRound();
    }

    function finishChoosePhase() {
      stopCoinTimer();
      if (gameSession.wrongWords.length > 0) {
        gameSession.phase = 'fix';
        gameSession.fixWords = shuffle(gameSession.wrongWords);
        gameSession.fixIndex = 0;
        updatePhaseDots();
        showFixRound();
      } else {
        awardSessionCoins();
        showDoneScreen();
      }
    }

    // ---- Fix Dad round ------------------------------------------
    // Shows the phonetic misspelling and asks for the correct word.

    function buildDistracts(entry, count) {
      var pool = gameSession.sound.words.filter(function(w) { return w.w !== entry.w; });
      return shuffle(pool).slice(0, count).map(function(w) { return w.w; });
    }

    function showFixRound() {
      if (gameSession.fixIndex >= gameSession.fixWords.length) {
        awardSessionCoins();
        showDoneScreen();
        return;
      }
      var entry = gameSession.fixWords[gameSession.fixIndex];
      startCoinTimer();

      var options = shuffle([entry.w].concat(buildDistracts(entry, 3)));
      var optHtml = options.map(function(opt) {
        return '<button class="fix-opt" data-word="' + escapeHtml(opt) + '">' + escapeHtml(opt) + '</button>';
      }).join('');

      var content = $('game-content');
      content.innerHTML =
        '<div class="game-header">' +
        '<div class="gh-sound">' + gameSession.sound.emoji + ' Fix it up!</div>' +
        '<div class="gh-right">' +
        '<div class="coin-timer" id="coin-timer">🪙 +1 in <span id="ct-secs">60</span>s</div>' +
        '</div></div>' +
        '<div class="score-badge">Fix-up round ' + (gameSession.fixIndex + 1) + ' of ' + gameSession.fixWords.length + '</div>' +
        '<div id="feedback-area"></div>' +
        '<div class="game-card">' +
        '<span class="fix-label">😬 Dad wrote:</span>' +
        '<div class="fix-misspell">' + escapeHtml(entry.ph) + '</div>' +
        '<button class="speaker-btn" id="speak-btn">🔊</button>' +
        '<p class="word-hint">' + escapeHtml(entry.hint) + '</p>' +
        '<div class="fix-grid">' + optHtml + '</div>' +
        '</div>';

      $('speak-btn').addEventListener('click', function() { speak(entry.ph); });
      content.querySelectorAll('.fix-opt').forEach(function(btn) {
        btn.addEventListener('click', function() {
          handleFixAnswer(btn.getAttribute('data-word'), entry);
        });
      });
      setTimeout(function() { speak(entry.ph); }, 320);
    }

    function handleFixAnswer(chosen, entry) {
      pauseCoinTimer();
      document.querySelectorAll('.fix-opt').forEach(function(b) { b.disabled = true; });
      showFeedback(chosen === entry.w, entry);
      setTimeout(function() {
        gameSession.fixIndex++;
        showFixRound();
      }, chosen === entry.w ? 1600 : 2400);
    }

    // ---- Feedback -----------------------------------------------

    function showFeedback(isCorrect, entry) {
      var area = $('feedback-area');
      if (!area) return;
      var msg, cls;
      if (isCorrect) {
        msg = pick(CORRECT_MESSAGES);
        cls = 'feedback-correct';
      } else {
        var ti = (gameSession.sound.teamInfo || {})[entry.team] || {};
        msg = buildWrongMessage(entry.w, ti.label || entry.team, ti.family || entry.team);
        cls = 'feedback-wrong';
      }
      area.innerHTML = '<div class="feedback-bubble ' + cls + '">' + escapeHtml(msg) + '</div>';
      setTimeout(function() { if (area) area.innerHTML = ''; }, isCorrect ? 1800 : 2300);
    }

    // ---- Say Why — metacognition after every correct answer -----

    function showSayWhy(entry) {
      var area = $('say-why-area');
      if (!area) return;
      var ti = (gameSession.sound.teamInfo || {})[entry.team] || {};
      var fam = ti.label || entry.team;
      var opts = [
        'It\'s in the MIDDLE of the word',
        'It\'s at the END of the word',
        'It belongs with the ' + fam + ' word family',
        'I just know this word!'
      ];
      var html = '<div class="say-why-card"><p class="say-why-q">Why did you choose <strong>' +
                 escapeHtml(fam) + '</strong>?</p><div class="say-why-opts">';
      opts.forEach(function(opt) {
        html += '<button class="say-why-btn">' + escapeHtml(opt) + '</button>';
      });
      html += '</div></div>';
      area.innerHTML = html;
      area.querySelectorAll('.say-why-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          area.innerHTML = '';
          advanceChoiceWord();
        });
      });
    }

    // ---- Coin timer ---------------------------------------------
    // 60 continuous active seconds = 1 coin.
    // Pauses when tab is hidden or idle > 30 s.

    function startCoinTimer() {
      stopCoinTimer();
      gameSession.lastActiveMs = Date.now();
      gameSession.coinTimerInterval = setInterval(function() {
        if (document.hidden) return;
        if (Date.now() - gameSession.lastActiveMs > 30000) return;
        gameSession.coinSeconds++;
        var el = $('ct-secs');
        if (el) el.textContent = Math.max(1, 60 - (gameSession.coinSeconds % 60));
      }, 1000);
      document.addEventListener('touchstart', resetCoinIdle, { passive: true });
      document.addEventListener('click', resetCoinIdle);
    }

    function resetCoinIdle() { gameSession.lastActiveMs = Date.now(); }

    function pauseCoinTimer() {
      // Freeze the idle timestamp so the interval skips counting.
      gameSession.lastActiveMs = 0;
    }

    function stopCoinTimer() {
      if (gameSession.coinTimerInterval) {
        clearInterval(gameSession.coinTimerInterval);
        gameSession.coinTimerInterval = null;
      }
      document.removeEventListener('touchstart', resetCoinIdle);
      document.removeEventListener('click', resetCoinIdle);
    }

    document.addEventListener('visibilitychange', function() {
      if (document.hidden) gameSession.lastActiveMs = 0;
      else gameSession.lastActiveMs = Date.now();
    });

    // ---- Award coins at session end -----------------------------

    function getDailyCap(p) {
      return (p && p.economy && p.economy.dailyCap) ? p.economy.dailyCap : 20;
    }

    function awardSessionCoins() {
      var coinsEarned = Math.floor(gameSession.coinSeconds / 60);
      var p = activeProfile();
      if (!p) { gameSession.sessionCoins = coinsEarned; return; }

      var today = todayKey();
      if (p.economy.dailyDate !== today) {
        p.economy.dailyDate  = today;
        p.economy.dailyCoins = 0;
      }

      if (gameSession.soundId && alreadyPlayedToday(p, gameSession.soundId)) {
        coinsEarned = 0;
        gameSession.repeatBlocked = true;
      }

      var cap      = getDailyCap(p);
      var awarded  = Math.min(coinsEarned, Math.max(0, cap - (p.economy.dailyCoins || 0)));
      p.economy.coins      = (p.economy.coins      || 0) + awarded;
      p.economy.dailyCoins = (p.economy.dailyCoins || 0) + awarded;
      p.economy.totalEarned = (p.economy.totalEarned || 0) + awarded;
      p.economy.gems = Math.max(p.economy.gems || 0, Math.floor((p.economy.totalEarned || 0) / 40));
      if (awarded > 0) {
        p.coinHistory.push({ date: today, amount: awarded, soundId: gameSession.soundId });
      }
      gameSession.sessionCoins = awarded;
      updateStreak(p);
      saveActiveProfile();
    }

    // ---- Streak -------------------------------------------------

    function updateStreak(p) {
      p.totalSessions = (p.totalSessions || 0) + 1;
      p.lastPlayDate = todayKey();
    }

    // ---- Word wall & mistakes -----------------------------------

    function addToWall(entry) {
      var p = activeProfile();
      if (!p) return;
      if (!p.wall) p.wall = {};
      var sid = entry._sid || gameSession.soundId;
      if (!p.wall[sid]) p.wall[sid] = {};
      if (!p.wall[sid][entry.team]) p.wall[sid][entry.team] = [];
      if (p.wall[sid][entry.team].indexOf(entry.w) === -1) {
        p.wall[sid][entry.team].push(entry.w);
      }
    }

    function addToMistakes(entry) {
      var p = activeProfile();
      if (!p) return;
      if (!p.mistakes) p.mistakes = [];
      if (!p.mistakes.find(function(m) { return m.w === entry.w; })) {
        p.mistakes.push({ w: entry.w, team: entry.team, soundId: entry._sid || gameSession.soundId, date: todayKey() });
      }
    }

    // ---- Surprise drop ------------------------------------------

    // World-specific prize pools — items relevant to each world
    var WORLD_PRIZE_POOLS = {
      beach: [
        'toy:surfboard', 'toy:ball', 'toy:kite', 'toy:trophy',
        'veh:boat', 'veh:jetski', 'house:cottage'
      ],
      jungle: [
        'toy:teddy', 'toy:sword', 'toy:rocket', 'toy:trophy',
        'veh:bike', 'veh:helicopter', 'house:treehouse'
      ],
      candy: [
        'toy:balloon', 'toy:wand', 'toy:guitar', 'toy:trophy',
        'veh:scooter', 'veh:car', 'house:cottage'
      ],
      farm: [
        'toy:teddy', 'toy:basketball', 'toy:guitar', 'toy:trophy',
        'veh:truck', 'veh:digger', 'veh:bike', 'house:construction'
      ],
      city: [
        'toy:skateboard', 'toy:basketball', 'toy:guitar', 'toy:trophy',
        'veh:car', 'veh:scooter', 'veh:motorbike', 'house:firestation'
      ],
      waterpark: [
        'toy:surfboard', 'toy:ball', 'toy:balloon', 'toy:trophy',
        'veh:jetski', 'veh:boat', 'house:pirate'
      ],
      space: [
        'toy:rocket', 'toy:wand', 'toy:sword', 'toy:trophy',
        'veh:ufo', 'veh:helicopter', 'veh:plane', 'house:spaceship'
      ],
      snow: [
        'toy:teddy', 'toy:kite', 'toy:balloon', 'toy:trophy',
        'veh:rollerblades', 'veh:train', 'house:igloo'
      ]
    };

    // Flat gift pool for fallback
    var GIFT_POOL = (function() {
      var items = [];
      AVATAR_TOYS.forEach(function(t) { items.push('toy:' + t.key); });
      AVATAR_VEHICLES.forEach(function(v) { items.push('veh:' + v.key); });
      AVATAR_HOUSES.forEach(function(h) { items.push('house:' + h.key); });
      return items;
    })();

    function checkAndTriggerDrop(p) {
      var today = todayKey();
      var dropsToday = (p.drops || []).filter(function(d) { return d.date === today; }).length;
      if (dropsToday >= 2) return null;
      var isPerfect = gameSession.wrongCount === 0;
      var chance = dropsToday === 0 ? 1 : (isPerfect ? 0.5 : 0.33);
      if (Math.random() >= chance) return null;
      migrateAvatar(p);
      // Use world-specific prize pool — derive from selected background scene
      var ch = p.avatar.characterKey ? findCharacter(p.avatar.characterKey) : null;
      var bgKey = p.avatar.background ? p.avatar.background.replace('bg:', '') : null;
      var world = bgKey || (ch ? ch.world : 'beach');
      var pool = WORLD_PRIZE_POOLS[world] || GIFT_POOL;
      var locked = pool.filter(function(item) {
        return p.avatar.unlocked.indexOf(item) === -1;
      });
      // Fall back to full pool if world pool exhausted
      if (locked.length === 0) {
        locked = GIFT_POOL.filter(function(item) {
          return p.avatar.unlocked.indexOf(item) === -1;
        });
      }
      if (locked.length === 0) return null;
      if (!p.drops) p.drops = [];
      p.drops.push({ date: today, seen: false });
      return shuffle(locked.slice()).slice(0, 3);
    }

    // ---- Done screen --------------------------------------------

    function showDoneScreen() {
      gameSession.phase = 'done';
      updatePhaseDots();

      var p = activeProfile();
      var total   = gameSession.words.length;
      var correct = gameSession.correctFirst;
      var stars   = starsFromScore(correct, total);
      var dropChoices = p ? checkAndTriggerDrop(p) : null;
      if (p) saveActiveProfile();

      var coinsMsg = '';
      if (gameSession.repeatBlocked) {
        coinsMsg = 'You already earned coins for this sound today — try a different week!';
      } else if (gameSession.sessionCoins > 0) {
        coinsMsg = '🪙 You earned <strong>' + gameSession.sessionCoins + ' coin' +
          (gameSession.sessionCoins !== 1 ? 's' : '') + '</strong> this session!';
      } else {
        coinsMsg = 'You played for less than a minute — come back for coins!';
      }

      var econ   = p ? (p.economy || {}) : {};
      var capMsg = econ.dailyCoins >= getDailyCap(p)
        ? '<p class="cap-msg">Daily coin cap reached! Come back tomorrow 🌟' +
          '<br>Your hard work was brilliant either way.</p>'
        : '';

      var dropHtml = dropChoices
        ? '<div class="drop-modal" id="drop-modal"><span class="drop-box">🎁</span>' +
          '<p style="font-weight:700;margin:4px 0;">Try one of these on your avatar!</p>' +
          '<div class="drop-emoji-row">' +
          dropChoices.map(function(e) {
            var display = itemIcon(e);
            var lbl = '<div style="font-size:10px;margin-top:2px;">' + itemLabel(e) + '</div>';
            return '<button class="drop-emoji-btn" data-emoji="' + e + '">' + display + lbl + '</button>';
          }).join('') +
          '</div></div>'
        : '';

      var hasSentences = !!(gameSession.soundId && SOUNDS[gameSession.soundId] &&
        SOUNDS[gameSession.soundId].sentenceStarters &&
        SOUNDS[gameSession.soundId].sentenceStarters.length);

      var nextWeekBtn = '';
      if (gameSession.repeatBlocked) {
        var nextSoundId = findUnplayedSound(p);
        if (nextSoundId) {
          var nextSound = SOUNDS[nextSoundId];
          var nextLabel = nextSound ? nextSound.label : nextSoundId;
          nextWeekBtn = '<button class="btn" id="done-next-week" style="background:var(--gn3);">Try ' + escapeHtml(nextLabel) + ' →</button>';
        }
      }

      var content = $('game-content');
      content.innerHTML =
        '<div class="done-screen">' +
        '<div class="done-stars">' + starsHtml(stars) + '</div>' +
        '<h2 class="done-msg">' + escapeHtml(pick(SESSION_COMPLETE_MESSAGES)) + '</h2>' +
        '<p class="done-score">' + correct + ' of ' + total + ' correct on the first try</p>' +
        '<p class="done-coins">' + coinsMsg + '</p>' +
        capMsg + dropHtml +
        nextWeekBtn +
        (hasSentences
          ? '<button class="btn" id="done-sentences">✍️ Write sentences →</button>'
          : '') +
        '<button class="btn btn-secondary" id="done-home">Back to home</button>' +
        '<button class="btn btn-ghost" id="done-again">Play again 🎲</button>' +
        '</div>';

      if (hasSentences) {
        $('done-sentences').addEventListener('click', function() {
          pendingSoundId = gameSession.soundId;
          showScreen('s-sentences');
        });
      }
      $('done-home').addEventListener('click', function() { showScreen('s-home'); });
      $('done-again').addEventListener('click', function() {
        if (gameSession.mode === 'boss') startBossGame();
        else startGame(gameSession.soundId, 'surprise');
      });
      if (gameSession.repeatBlocked && $('done-next-week')) {
        var nxtId = findUnplayedSound(p);
        $('done-next-week').addEventListener('click', function() {
          startGame(nxtId, 'surprise');
        });
      }

      if (dropChoices) {
        content.querySelectorAll('.drop-emoji-btn').forEach(function(btn) {
          btn.addEventListener('click', function() {
            var chosen = btn.getAttribute('data-emoji');
            var pp = activeProfile();
            if (pp) {
              migrateAvatar(pp);
              if (pp.avatar.unlocked.indexOf(chosen) === -1) {
                pp.avatar.unlocked.push(chosen);
              }
              // Store in worldPrizes for the current world (from selected scene)
              var ch = pp.avatar.characterKey ? findCharacter(pp.avatar.characterKey) : null;
              var bgK = pp.avatar.background ? pp.avatar.background.replace('bg:', '') : null;
              var world = bgK || (ch ? ch.world : 'beach');
              if (!pp.worldPrizes) pp.worldPrizes = {};
              if (!pp.worldPrizes[world]) pp.worldPrizes[world] = [];
              if (pp.worldPrizes[world].indexOf(chosen) === -1) {
                pp.worldPrizes[world].push(chosen);
              }
              equipItem(pp, chosen);
              saveActiveProfile();
            }
            var ch2 = pp ? (pp.avatar.characterKey ? findCharacter(pp.avatar.characterKey) : null) : null;
            var bgK2 = pp && pp.avatar.background ? pp.avatar.background.replace('bg:', '') : null;
            var worldLabel = bgK2 || (ch2 ? ch2.world : '');
            $('drop-modal').innerHTML = '<span style="font-size:46px;">' + itemIcon(chosen) + '</span>' +
              '<p style="margin:6px 0 0;font-weight:800;">Prize unlocked! 🎉</p>' +
              '<p style="font-size:12px;color:#888;margin:4px 0 0;">Added to your ' + worldLabel + ' house</p>';
          });
        });
      }
    }

    // ---- Boss mode (review all sounds) ---------------------------

    function startBossGame() {
      var p = activeProfile();
      if (!p) return;
      var allWords = [];
      var ids = Object.keys(SOUNDS);
      var levelForGame = p.level || 'core';
      ids.forEach(function(id) {
        var s = SOUNDS[id];
        s.words.forEach(function(w) {
          if (levelForGame === 'core' && w.lv !== 'core') return;
          if (levelForGame === 'challenge' && w.lv === 'extension') return;
          allWords.push({ w: w.w, team: w.team, hint: w.hint, lv: w.lv, _sid: id });
        });
      });
      if (!allWords.length) { alert('No words available yet!'); return; }
      var picked = shuffle(allWords).slice(0, 10);
      var firstSoundId = ids[0];
      for (var i = 0; i < ids.length; i++) {
        var s = SOUNDS[ids[i]];
        if (s.words.indexOf(picked[0]) !== -1) { firstSoundId = ids[i]; break; }
      }
      startGame(firstSoundId, 'boss', picked);
    }

    // ---- Play tile clicks (delegated) ---------------------------

    document.addEventListener('click', function(ev) {
      var tile = ev.target.closest('.play-tile');
      if (!tile || tile.disabled) return;
      var mode = tile.getAttribute('data-mode');
      if (!mode) return;

      if (mode === 'thisweek') {
        var we = currentWeekEntry();
        if (we && we.comingSoon) {
          alert("This week's content is coming soon! Try Surprise Me or Choose Your Sound.");
          return;
        }
        if (we && we.soundId) startGame(we.soundId, 'thisweek');
        else alert('No week content set. Try Surprise Me or Choose Your Sound.');

      } else if (mode === 'surprise') {
        var ids = Object.keys(SOUNDS);
        startGame(ids[Math.floor(Math.random() * ids.length)], 'surprise');

      } else if (mode === 'problems') {
        var p = activeProfile();
        if (!p || !(p.mistakes || []).length) return;
        var seen = {};
        var problemWords = [];
        p.mistakes.forEach(function(m) {
          if (seen[m.w]) return;
          seen[m.w] = true;
          var s = SOUNDS[m.soundId];
          if (!s) return;
          var entry = s.words.find(function(w) { return w.w === m.w; });
          if (entry) problemWords.push(entry);

        if (!problemWords.length) return;
        startGame(p.mistakes[0].soundId, 'problems', problemWords);

        renderSoundPicker();

        pendingSoundId = null;
        var weS = currentWeekEntry();
        if (weS && weS.soundId) pendingSoundId = weS.soundId;

led|mumbling)\b/i;

    function assessSentenceCriteria(text, targetWords) {
      var t = (text || '').trim();
      if (!t) return { stars: 0, met: [] };
      var words = t.split(/\s+/).filter(function(w) { return w.length > 0; });
      var met = [];
      if (words.length < 3) return { stars: 0, met: [] };
      met.push('basic');
      var stars = 1;
      if (ADJ_RE.test(t)) { met.push('adj'); stars++; }
      if (VERB_RE.test(t)) { met.push('verb'); stars++; }
      if (TIME_RE.test(t)) { met.push('time'); stars++; }
      if (hasTargetWord(t, targetWords)) { met.push('target'); stars++; }
      return { stars: stars, met: met };
    }

    function assessSentence(text, targetWords) {
      return assessSentenceCriteria(text, targetWords).stars;
    }

    function hasTargetWord(text, wordList) {
      if (!wordList || !wordList.length) return false;
      var lower = text.toLowerCase();
      return wordList.some(function(w) {
        return lower.indexOf(w.toLowerCase()) > -1;
      });
    }

    // ---- Sentences screen ---------------------------------------

    function renderSentencesScreen() {
      var p = activeProfile();
      if (!p) { showScreen('s-profiles'); return; }

      var soundId = pendingSoundId || (function() { var we = currentWeekEntry(); return we ? we.soundId : null; })();
      pendingSoundId = null;

      var sound = soundId ? SOUNDS[soundId] : null;
      var wordPool = sound ? shuffle(sound.words.map(function(w) { return w.w; })) : [];
      var count = Math.min(4, wordPool.length);
      var starters = [];
      for (var i = 0; i < count; i++) {
        starters.push('Write a sentence including the word ' + wordPool[i]);
      }
      if (!starters.length) {
        starters = ['Write a sentence about your day', 'Write a sentence about your favourite thing', 'Write a sentence about something fun'];
      }

      sentenceSession = {
        starters: starters, index: 0, sentences: [], coins: 0,
        targetBonusUsed: false, soundId: soundId,
        targetWord: wordPool.length ? wordPool : []
      };
      renderSentenceCard();
    }

    function renderSentenceCard() {
      var container = $('s-sentences');
      if (sentenceSession.index >= sentenceSession.starters.length) {
        showSentencesDone();
        return;
      }

      var starter = sentenceSession.starters[sentenceSession.index];
      var total = sentenceSession.starters.length;
      var targetWords = sentenceSession.soundId && SOUNDS[sentenceSession.soundId]
        ? SOUNDS[sentenceSession.soundId].words.map(function(w) { return w.w; })
        : [];

      var hasTarget = targetWords.length > 0;
      var criteriaRows = [
        { id: 'basic',  label: 'A sentence',          eg: '3 or more words' },
        { id: 'adj',    label: 'A describing word',   eg: 'e.g. <em>fluffy, huge, bright</em>' },
        { id: 'verb',   label: 'A doing word',         eg: 'e.g. <em>jumped, climbed, dropped</em>' },
        { id: 'time',   label: 'Where or when',       eg: 'e.g. <em>at the park, after lunch</em>' },
        { id: 'target', label: 'A spelling word',     eg: 'use one from this week' }
      ];
      var criteriaHtml = criteriaRows.map(function(c, i) {
        var stars = repeatStr('⭐', i + 1);
        var dimTarget = c.id === 'target' && !hasTarget ? ' sc-dim' : '';
        return '<div class="sc-row' + dimTarget + '" id="sc-' + c.id + '">' +
          '<span class="sc-tick" id="sct-' + c.id + '">⬜</span>' +
          '<span class="sc-stars">' + stars + '</span>' +
          '<span class="sc-text"><strong>' + c.label + '</strong> <span class="sc-eg">' + c.eg + '</span></span>' +
          '</div>';
      }).join('');

      container.innerHTML =
        '<button class="btn-back" data-back="s-home">← Back</button>' +
        '<div class="sentences-screen">' +
        '<div class="starter-card">' +
        '<div class="starter-label">Sentence ' + (sentenceSession.index + 1) + ' of ' + total + '</div>' +
        '<p class="starter-text">' + escapeHtml(starter) + '</p>' +
        '<textarea class="sentence-input" id="sentence-input" placeholder="Type your sentence here…" rows="3"></textarea>' +
        '<span class="star-big" id="star-big">⬜⬜⬜⬜⬜</span>' +
        '<div class="sc-guide">' + criteriaHtml + '</div>' +
        '<div class="star-ladder">' +
        '<div class="sl-step" id="sl-0"></div>' +
        '<div class="sl-step" id="sl-1"></div>' +
        '<div class="sl-step" id="sl-2"></div>' +
        '<div class="sl-step" id="sl-3"></div>' +
        '<div class="sl-step" id="sl-4"></div>' +
        '</div>' +
        '</div>' +
        '<button class="btn" id="sentence-submit">Submit →</button>' +
        '</div>';

      var input = $('sentence-input');
      var starBig = $('star-big');
      var IDS = ['basic', 'adj', 'verb', 'time', 'target'];

      function updateCriteria(met) {
        IDS.forEach(function(id) {
          var tick = $('sct-' + id);
          var row  = $('sc-' + id);
          if (!tick || !row) return;
          var isMet = met.indexOf(id) !== -1;
          tick.textContent = isMet ? '✅' : '⬜';
          row.classList.toggle('sc-met', isMet);
        });
      }

      input.addEventListener('input', function() {
        var result = assessSentenceCriteria(input.value, targetWords);
        updateStarLadder(result.stars);
        updateCriteria(result.met);
        var filled = repeatStr('⭐', result.stars) + repeatStr('⬜', 5 - result.stars);
        if (starBig.textContent !== filled) {
          starBig.textContent = filled;
          starBig.classList.remove('pulse');
          void starBig.offsetWidth;
          starBig.classList.add('pulse');
        }
      });

      $('sentence-submit').addEventListener('click', function() {
        var text = (input.value || '').trim();
        if (!text) { input.focus(); return; }
        var stars = Math.max(1, assessSentence(text, targetWords));
        var coinsEarned = STAR_COINS[stars] || 0;
        sentenceSession.sentences.push({ text: text, stars: stars, coins: coinsEarned });
        sentenceSession.coins += coinsEarned;
        sentenceSession.index++;
        renderSentenceCard();
      });
    }

    function updateStarLadder(stars) {
      for (var i = 0; i < 5; i++) {
        var el = $('sl-' + i);
        if (el) el.className = 'sl-step' + (i < stars ? ' earned' : '');
      }
    }

    function showSentencesDone() {
      var p = activeProfile();
      var total = sentenceSession.sentences.length;
      var totalStars = sentenceSession.sentences.reduce(function(acc, s) { return acc + s.stars; }, 0);
      var coinsToAward = sentenceSession.coins;

      if (p && coinsToAward > 0) {
        var today = todayKey();
        if (p.economy.dailyDate !== today) { p.economy.dailyDate = today; p.economy.dailyCoins = 0; }
        if (sentenceSession.soundId && alreadyPlayedToday(p, sentenceSession.soundId)) {
          coinsToAward = 0;
        }
        var awarded = Math.min(coinsToAward, Math.max(0, getDailyCap(p) - (p.economy.dailyCoins || 0)));
        p.economy.coins       = (p.economy.coins       || 0) + awarded;
        p.economy.dailyCoins  = (p.economy.dailyCoins  || 0) + awarded;
        p.economy.totalEarned = (p.economy.totalEarned || 0) + awarded;
        p.economy.gems = Math.max(p.economy.gems || 0, Math.floor((p.economy.totalEarned || 0) / 40));
        if (awarded > 0) {
          p.coinHistory.push({ date: today, amount: awarded, soundId: sentenceSession.soundId, source: 'sentences' });
        }
        coinsToAward = awarded;
        updateStreak(p);
        saveActiveProfile();
      }

      var avgStars = total > 0 ? Math.round(totalStars / total) : 1;
      var container = $('s-sentences');
      container.innerHTML =
        '<button class="btn-back" data-back="s-home">← Back</button>' +
        '<div class="sentences-done">' +
        '<div style="font-size:56px;">✍️</div>' +

        '<p style="color:var(--mut);">' + total + ' sentence' + (total !== 1 ? 's' : '') + ' · ' + totalStars + ' stars total</p>' +
        (coinsToAward > 0 ? '<p style="color:var(--ye3);font-weight:800;">🪙 +' + coinsToAward + ' coins earned!</p>' : '<p style="color:var(--mut);">Keep practising to earn coins!</p>') +

    function updateReadingPreview(minsPerPage) {
      var start  = parseInt(($('r-start')  || {}).value, 10) || 0;
      var finish = parseInt(($('r-finish') || {}).value, 10) || 0;
      var mins   = parseInt(($('r-mins')   || {}).value, 10) || 0;
      var el = $('r-preview');
      if (!el) return;
      var pages = (start && finish && finish >= start) ? finish - start + 1 : 0;
      if (!pages || !mins) {
        el.textContent = 'Fill in pages and minutes to see your coins';
        return;
      }
      var coins = Math.floor(mins / minsPerPage);
      el.textContent = pages + ' pages · 🪙 You\'ll earn ' + coins + ' coin' + (coins !== 1 ? 's' : '') + ' for this reading!';
    }

    function submitReadingEntry(minsPerPage) {
      var title  = ($('r-title')  ? $('r-title').value  : '').trim();
      var author = ($('r-author') ? $('r-author').value : '').trim();
      var start  = parseInt(($('r-start')  ? $('r-start').value  : ''), 10) || 0;
      var finish = parseInt(($('r-finish') ? $('r-finish').value : ''), 10) || 0;
      var mins   = parseInt(($('r-mins')   ? $('r-mins').value   : ''), 10) || 0;
      var pages  = (start && finish && finish >= start) ? finish - start + 1 : 0;

      if (!title)    { alert('Please enter the book title.'); return; }
      if (start < 1) { alert('Please enter your starting page number.'); return; }
      if (finish < start) { alert('Finish page must be greater than or equal to start page.'); return; }
      if (mins  < 1) { alert('Please enter how many minutes you read.'); return; }

      var coinsEarned = Math.floor(mins / minsPerPage);
      var today = todayKey();
      var entry = { date: today, title: title, author: author, pageStart: start, pageFinish: finish, pages: pages, mins: mins, coins: coinsEarned };

      var p = activeProfile();
      if (p) {
        if (!p.readingLog) p.readingLog = [];
        p.readingLog.unshift(entry);
        if (coinsEarned > 0) {
          if (p.economy.dailyDate !== today) { p.economy.dailyDate = today; p.economy.dailyCoins = 0; }
          var awarded = Math.min(coinsEarned, Math.max(0, getDailyCap(p) - (p.economy.dailyCoins || 0)));
          p.economy.coins       = (p.economy.coins       || 0) + awarded;
          p.economy.dailyCoins  = (p.economy.dailyCoins  || 0) + awarded;
          p.economy.totalEarned = (p.economy.totalEarned || 0) + awarded;
          p.economy.gems = Math.max(p.economy.gems || 0, Math.floor((p.economy.totalEarned || 0) / 40));
          if (awarded > 0) {
            p.coinHistory.push({ date: today, amount: awarded, source: 'reading', title: title });
          }
          entry.coins = awarded;
          updateStreak(p);
        }
        saveActiveProfile();
      }
      readingTab = 'history';
      renderReadingScreen();
    }

      var worldLabels = { beach:'Beach', jungle:'Jungle', candy:'Candy Land', farm:'Farm', city:'City', waterpark:'Water Park', space:'Space', snow:'Snow' };
      var wp = p.worldPrizes || {};
      html += '<div style="margin-bottom:12px;">';
      for (var wi = 0; wi < worlds.length; wi++) {
        var wk = worlds[wi];
        var items = wp[wk] || [];
        html += '<div style="display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid rgba(0,0,0,0.06);">';
        html += '<span style="font-size:12px;font-weight:700;color:#6B3FA0;min-width:70px;">' + worldLabels[wk] + '</span>';
        if (items.length === 0) {
          html += '<span style="font-size:11px;color:#ccc;">No prizes yet</span>';
        } else {
          for (var ii = 0; ii < items.length; ii++) {
            html += '<span style="font-size:18px;">' + itemIcon(items[ii]) + '</span>';
          }
        }
        html += '</div>';
      }

      // Full catalogue
      for (var ci = 0; ci < cats.length; ci++) {
        var cat = cats[ci];
        html += '<div style="margin-bottom:8px;"><span style="font-size:13px;font-weight:700;color:#555;">' + cat.title + '</span>';

          var isOwned = unlocked.indexOf(fullKey) !== -1;
          html += '<span style="font-size:22px;padding:2px;border-radius:6px;' +
            (isOwned ? 'opacity:1;' : 'opacity:0.3;filter:grayscale(1);') +
            '" title="' + item.label + (isOwned ? ' (owned)' : ' (locked)') + '">' +

      var totalOwned = unlocked.filter(function(k) { return k.indexOf('toy:') === 0 || k.indexOf('veh:') === 0 || k.indexOf('house:') === 0; }).length;
      var totalItems = AVATAR_TOYS.length + AVATAR_VEHICLES.length + AVATAR_HOUSES.length;
      html += '<div style="font-size:12px;color:#888;text-align:center;margin-top:6px;">' + totalOwned + ' / ' + totalItems + ' prizes collected</div>';

    function wireSettingsEvents(p) {
      // Name
      var saveName = $('sett-save-name');
      if (saveName) saveName.addEventListener('click', function() {
        var val = ($('sett-name').value || '').trim();
        if (!val) { alert('Please enter a name.'); return; }
        p.name = val;
        saveActiveProfile();
        alert('Name saved!');
      });

      // Go to avatar room
      var goAvatar = $('sett-go-avatar');
      if (goAvatar) goAvatar.addEventListener('click', function() { showScreen('s-avatarroom'); });

      // Reset profile
      var resetProf = $('sett-reset-profile');
      if (resetProf) resetProf.addEventListener('click', function() {
        if (!confirm('Reset ' + p.name + '\'s profile? This will delete all their progress.')) return;
        state.profiles[state.activeIndex] = freshProfile(p.name);
        saveActiveProfile();
        showScreen('s-home');
      });

      // Week cards
      $('s-settings').querySelectorAll('.week-card:not(.coming-soon)').forEach(function(card) {
        card.addEventListener('click', function() {
          var wk = card.getAttribute('data-week');
          if (!wk) return;
          p.weekKey = wk;
          saveActiveProfile();
          renderSettingsScreen();
        });
      });

      // Level tabs
      $('s-settings').querySelectorAll('.level-tab').forEach(function(tab) {
        tab.addEventListener('click', function() {
          p.level = tab.getAttribute('data-level');
          saveActiveProfile();
          $('s-settings').querySelectorAll('.level-tab').forEach(function(t) {
            t.classList.toggle('active', t.getAttribute('data-level') === p.level);
          });
        });
      });

      // Reading — mins per page
      var saveMpp = $('sett-save-mpp');
      if (saveMpp) saveMpp.addEventListener('click', function() {
        var val = parseInt(($('sett-mpp') || {}).value, 10);
        if (!val || val < 1) { alert('Please enter a valid number (minimum 1).'); return; }
        p.minsPerPage = val;
        saveActiveProfile();
        alert('Reading setting saved!');
      });

      // Coin cap
      var saveCap = $('sett-save-cap');
      if (saveCap) saveCap.addEventListener('click', function() {
        var val = parseInt(($('sett-cap') || {}).value, 10);
        if (!val || val < 5) { alert('Minimum daily cap is 5 coins.'); return; }
        if (!p.economy) p.economy = {};
        p.economy.dailyCap = val;
        saveActiveProfile();
        alert('Daily cap saved!');
      });

      // Custom word — update team options when sound changes
      var cwSound = $('cw-sound');
      if (cwSound) cwSound.addEventListener('change', function() {
        var sound = SOUNDS[cwSound.value];
        var teamSel = $('cw-team');
        if (teamSel && sound) {
          teamSel.innerHTML = (sound.teams || []).map(function(t) {
            return '<option value="' + escapeHtml(t) + '">' + escapeHtml(t) + '</option>';
          }).join('');
        }
      });

      // Add custom word
      var cwAdd = $('cw-add');
      if (cwAdd) cwAdd.addEventListener('click', function() {
        var word = ($('cw-word') ? $('cw-word').value : '').trim().toLowerCase();
        var hint = ($('cw-hint') ? $('cw-hint').value : '').trim();
        var sid  = $('cw-sound') ? $('cw-sound').value : '';
        var team = $('cw-team')  ? $('cw-team').value  : '';
        if (!word)        { alert('Please enter a word.'); return; }
        if (!sid || !team){ alert('Please select a sound set and team.'); return; }
        if (!p.customWords) p.customWords = [];
        if (p.customWords.find(function(cw) { return cw.w === word && cw.soundId === sid; })) {
          alert('That word is already in your list.'); return;
        }
        p.customWords.push({ w: word, team: team, soundId: sid, lv: 'core', hint: hint || word, ph: word + '?' });
        saveActiveProfile();
        renderSettingsScreen();
      });

      // Delete custom word
      $('s-settings').querySelectorAll('.del-btn[data-cw-index]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var idx = parseInt(btn.getAttribute('data-cw-index'), 10);
          if (!p.customWords || idx < 0 || idx >= p.customWords.length) return;
          if (!confirm('Delete "' + p.customWords[idx].w + '"?')) return;
          p.customWords.splice(idx, 1);
          saveActiveProfile();
          renderSettingsScreen();
        });
      });

      // Reading log link
      var goReading = $('go-reading-log');
      if (goReading) goReading.addEventListener('click', function() {
        readingTab = 'history';
        showScreen('s-reading');
      });

      // PIN management
      function startPinSetup(isChange) {
        var container = $('s-settings');
        var newPin = '';
        var step = isChange ? 'verify' : 'enter';

        function drawSetup() {
          var heading = step === 'verify' ? 'Verify current PIN' :
                        step === 'enter'  ? 'Choose a new 4-digit PIN' :
                                           'Confirm your PIN';
          container.innerHTML =
            '<button class="btn-back" data-back="s-home">← Back</button>' +
            '<div class="pin-overlay">' +
            '<div style="font-size:36px;">' + (step === 'verify' ? '🔒' : '🔑') + '</div>' +
            '<h2 style="margin:8px 0 0;">Settings PIN</h2>' +
            '<p style="color:var(--mut);font-size:14px;margin:4px 0 0;">' + heading + '</p>' +
            '<div class="pin-dots" id="pin-dots">' +
            [0,1,2,3].map(function(i) {
              return '<div class="pin-dot' + (i < newPin.length ? ' filled' : '') + '"></div>';
            }).join('') + '</div>' +
            '<div class="pin-keypad">' +
            [1,2,3,4,5,6,7,8,9].map(function(n) {
              return '<button class="pin-key" data-digit="' + n + '">' + n + '</button>';
            }).join('') +
            '<button class="pin-key" id="pin-del">⌫</button>' +
            '<button class="pin-key" data-digit="0">0</button>' +
            '</div></div>';

          container.querySelectorAll('[data-digit]').forEach(function(btn) {
            btn.addEventListener('click', function() {
              if (newPin.length < 4) {
                newPin += btn.getAttribute('data-digit');
                if (newPin.length === 4) handleFull();
                else drawSetup();
              }
            });
          });
          var del = $('pin-del');
          if (del) del.addEventListener('click', function() { newPin = newPin.slice(0,-1); drawSetup(); });
        }

        var firstEntry = '';
        function handleFull() {
          if (step === 'verify') {
            if (newPin !== getSettingsPin()) {
              newPin = ''; step = 'verify';
              drawSetup();
              var dots = container.querySelectorAll('.pin-dot');
              for (var i = 0; i < dots.length; i++) dots[i].className = 'pin-dot error';
              return;
            }
            newPin = ''; step = 'enter'; drawSetup();
          } else if (step === 'enter') {
            firstEntry = newPin; newPin = ''; step = 'confirm'; drawSetup();
          } else if (step === 'confirm') {
            if (newPin !== firstEntry) {
              newPin = ''; step = 'enter'; firstEntry = '';
              drawSetup();
              var dots2 = container.querySelectorAll('.pin-dot');
              for (var j = 0; j < dots2.length; j++) dots2[j].className = 'pin-dot error';
              return;
            }
            saveSettingsPin(newPin);
            settingsPinUnlocked = true;
            renderSettingsScreen();
          }
        }
        drawSetup();
      }

      var setPin = $('sett-set-pin');
      if (setPin) setPin.addEventListener('click', function() { startPinSetup(false); });

      var changePin = $('sett-change-pin');
      if (changePin) changePin.addEventListener('click', function() { startPinSetup(true); });

      var removePin = $('sett-remove-pin');
      if (removePin) removePin.addEventListener('click', function() {
        if (!confirm('Remove the settings PIN? Anyone will be able to access settings.')) return;
        saveSettingsPin('');
        renderSettingsScreen();
      });

      // Cloud Sync buttons
      var newSyncBtn = $('sett-new-sync');
      if (newSyncBtn) newSyncBtn.addEventListener('click', function() {
        if (!cloudSync.url || !cloudSync.key) {
          alert('Please set up the cloud connection first.\n\nOpen "Cloud Connection Settings" below and enter your Supabase URL and Anon Key.');
          return;
        }
        var code = generateFamilyCode();
        cloudSync.familyCode = code;
        saveSyncConfig();
        pushToCloud();
        alert('Family Code created: ' + code + '\n\nUse this code on other devices to sync.');
        renderSettingsScreen();
      });

      var joinSyncBtn = $('sett-join-sync');
      if (joinSyncBtn) joinSyncBtn.addEventListener('click', function() {
        if (!cloudSync.url || !cloudSync.key) {
          alert('Please set up the cloud connection first.\n\nOpen "Cloud Connection Settings" below and enter your Supabase URL and Anon Key.');
          return;
        }
        var input = $('sync-join-code');
        var code = (input ? input.value : '').trim().toUpperCase();
        if (!code || code.length < 4) { alert('Please enter a valid family code.'); return; }
        cloudSync.familyCode = code;
        saveSyncConfig();
        pullFromCloud(function(updated) {
          if (updated) {
            alert('Synced! Data loaded from cloud.');
            state.profiles = loadProfiles();
            showScreen('s-profiles');
          } else {
            alert('Connected with code: ' + code + '\nNo existing cloud data found — your current data will be uploaded.');
            pushToCloud();
            renderSettingsScreen();
          }
        });
      });

      var syncNowBtn = $('sett-sync-now');
      if (syncNowBtn) syncNowBtn.addEventListener('click', function() {
        pullFromCloud(function(updated) {

      var saveSyncConfigBtn = $('sett-save-sync-config');

        var key = (keyInput ? keyInput.value : '').trim();
        if (!url || !key) { alert('Please enter both URL and key.'); return; }
        cloudSync.url = url;

      // Backup
      var backupBtn = $('sett-backup');
      if (backupBtn) backupBtn.addEventListener('click', function() {
        try {
          var raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) { alert('No data to back up yet.'); return; }
          var code = btoa(unescape(encodeURIComponent(raw)));
          var output = $('backup-output');
          var codeEl = $('backup-code');
          if (output && codeEl) {
            codeEl.value = code;
            output.style.display = 'block';
          }
        } catch (err) {
          alert('Backup failed: ' + err.message);
        }
      });

      var copyBtn = $('sett-copy-backup');
      if (copyBtn) copyBtn.addEventListener('click', function() {
        var codeEl = $('backup-code');
        if (!codeEl) return;
        codeEl.select();
        codeEl.setSelectionRange(0, 99999);
        try {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(codeEl.value).then(function() {
              copyBtn.textContent = '✅ Copied!';
              setTimeout(function() { copyBtn.textContent = '📋 Copy Code'; }, 2000);
            });
          } else {
            document.execCommand('copy');
            copyBtn.textContent = '✅ Copied!';
            setTimeout(function() { copyBtn.textContent = '📋 Copy Code'; }, 2000);
          }
        } catch (err) {
          alert('Tap and hold the code above to copy manually.');
        }
      });

      // Restore
      var restoreBtn = $('sett-restore');
      if (restoreBtn) restoreBtn.addEventListener('click', function() {
        var codeEl = $('restore-code');
        if (!codeEl) return;
        var code = (codeEl.value || '').trim();
        if (!code) { alert('Please paste a backup code first.'); return; }
        try {
          var raw = decodeURIComponent(escape(atob(code)));
          var data = JSON.parse(raw);
          if (!Array.isArray(data)) { alert('Invalid backup code.'); return; }
          if (!confirm('This will replace ALL current data with the backup. Continue?')) return;
          localStorage.setItem(STORAGE_KEY, raw);
          state.profiles = loadProfiles();
          state.activeIndex = null;
          alert('Backup restored! Returning to player select.');
          showScreen('s-profiles');
        } catch (err) {
          alert('Invalid backup code. Please check and try again.');
        }
      });

      var clearMistakes = $('sett-clear-mistakes');
      if (clearMistakes) clearMistakes.addEventListener('click', function() {
        if (!confirm('Clear ' + p.name + '\'s problem words list?')) return;
        p.mistakes = [];
        saveActiveProfile();
        alert('Problem words cleared.');
      });

      // Reset ALL data — two-step confirmation
      var resetAll = $('sett-reset-all');
      if (resetAll) resetAll.addEventListener('click', function() {
        if (!confirm('This will delete ALL data for BOTH players. There is no undo. Continue?')) return;
        if (!confirm('Last chance — delete everything and start fresh?')) return;
        localStorage.removeItem(STORAGE_KEY);
        state.profiles = [null, null];
        state.activeIndex = null;
        showScreen('s-profiles');
      });
    }

    // -----------------------------------
    // Daddy Got It Wrong game
    // -----------------------------------

    var dadWrongSession = {
      soundId: null, words: [], index: 0,
      score: 0, coins: 0, attempts: 0
    };

    var DAD_RULES = [
      [/igh/g, 'i'],   [/ai/g, 'ae'],  [/ay/g, 'ai'],  [/ea/g, 'ie'],
      [/ee/g, 'ie'],   [/oa/g, 'oe'],  [/oi/g, 'oy'],  [/oo/g, 'u'],
      [/ou/g, 'ow'],   [/er/g, 'ur'],  [/ir/g, 'er'],  [/ur/g, 'ir'],
      [/aw/g, 'or'],   [/ck/g, 'k'],   [/ph/g, 'f'],   [/tch/g, 'ch'],
      [/tion/g, 'shun'], [/wh/g, 'w'], [/or(?=[^e])/g, 'aw']
    ];

    function makeDadMistake(word) {
      var w = word.toLowerCase();
      var rules = shuffle(DAD_RULES.slice());
      for (var i = 0; i < rules.length; i++) {
        var result = w.replace(rules[i][0], rules[i][1]);
        if (result !== w) return result;
      }
      // Fallback: duplicate a consonant in the middle
      var m = w.match(/^(.+?)([bcdfghjklmnpqrstvwxyz])(.+)$/i);
      if (m) return m[1] + m[2] + m[2] + m[3];
      return w + 'z';
    }

    function startDadWrongGame(soundId) {
      var p = activeProfile();
      if (!p) return;
      var sound = SOUNDS[soundId];
      if (!sound) return;
      var pool = selectWords(soundId, p.level || 'core', 8);
      if (!pool.length) { alert('No words for this sound set yet!'); return; }
      dadWrongSession = {
        soundId: soundId,
        words: pool.map(function(w) {
          return { correct: w.w, wrong: makeDadMistake(w.w), hint: w.hint || '', firstTry: false };
        }),
        index: 0, score: 0, coins: 0, attempts: 0
      };
      showScreen('s-dadwrong');
    }

    function renderDadWrongCard() {
      var container = $('s-dadwrong');
      if (!dadWrongSession.words.length) {
        container.innerHTML = '<button class="btn-back" data-back="s-play">← Back</button>' +
          '<p>No game loaded. Go back and pick a game!</p>';
        return;
      }
      if (dadWrongSession.index >= dadWrongSession.words.length) {
        showDadWrongDone();
        return;
      }
      var current = dadWrongSession.words[dadWrongSession.index];
      var total = dadWrongSession.words.length;
      var progress = dadWrongSession.index + 1;

      var hintHtml = current.hint
        ? '<div class="dw-hint">💡 ' + escapeHtml(current.hint) + '</div>'
        : '';

      container.innerHTML =
        '<button class="btn-back" data-back="s-play">← Back</button>' +
        '<div style="padding-bottom:24px;">' +
        '<div class="dad-progress">Word ' + progress + ' of ' + total + '</div>' +
        '<div class="progress-track"><div class="progress-fill" id="dw-progress" style="width:' +
          Math.round(((progress - 1) / total) * 100) + '%;"></div></div>' +
        '<div style="margin-top:20px;font-size:15px;font-weight:700;color:var(--pu3);">Dad typed…</div>' +
        '<div class="dad-bubble">' +
        '<div class="dad-wrong-word" id="dw-wrong">' + escapeHtml(current.wrong) + '</div>' +
        '</div>' +
        hintHtml +
        '<button class="btn btn-ghost dw-hear-btn" id="dw-hear" style="width:100%;margin:10px 0 14px;">🔊 Hear the word</button>' +
        '<div style="font-size:15px;font-weight:700;color:var(--txt);margin-bottom:10px;">What should it be? ✏️</div>' +
        '<input class="input" id="dw-input" type="text" autocomplete="off" autocorrect="off" ' +
          'autocapitalize="none" spellcheck="false" placeholder="Type the correct spelling…" />' +
        '<div class="dad-feedback" id="dw-feedback"></div>' +
        '<button class="btn" id="dw-check" style="width:100%;margin-top:14px;">Check ✓</button>' +
        '</div>';

      $('dw-hear').addEventListener('click', function() {
        speak(current.correct);
      });

      var input = $('dw-input');
      var feedback = $('dw-feedback');
      var checkBtn = $('dw-check');
      var attempts = 0;

      function check() {
        var val = (input.value || '').trim().toLowerCase();
        if (!val) { input.focus(); return; }
        dadWrongSession.attempts++;
        if (val === current.correct.toLowerCase()) {
          var firstTry = attempts === 0;
          current.firstTry = firstTry;
          if (firstTry) { dadWrongSession.score++; dadWrongSession.coins++; }
          feedback.style.color = 'var(--gn3)';
          feedback.textContent = firstTry ? '✅ You fixed it!' : '✅ Correct!';
          checkBtn.textContent = 'Next word →';
          checkBtn.removeEventListener('click', check);
          checkBtn.addEventListener('click', function next() {
            checkBtn.removeEventListener('click', next);
            dadWrongSession.index++;
            renderDadWrongCard();
          });
          input.disabled = true;
        } else {
          attempts++;
          feedback.style.color = 'var(--pk3)';
          feedback.textContent = attempts === 1 ? '❌ Not quite — try again!' : '❌ Hmm… think about the sound!';
          input.value = '';
          input.focus();
        }
      }

      checkBtn.addEventListener('click', check);
      input.addEventListener('keydown', function(e) {
        if (e.keyCode === 13) check();
      });
      input.focus();
    }

    function showDadWrongDone() {
      var p = activeProfile();
      var total = dadWrongSession.words.length;
      var score = dadWrongSession.score;
      var coinsEarned = dadWrongSession.coins;

      if (p && coinsEarned > 0) {
        var today = todayKey();
        if (p.economy.dailyDate !== today) { p.economy.dailyDate = today; p.economy.dailyCoins = 0; }
        var cap = getDailyCap(p);
        var awarded = Math.min(coinsEarned, Math.max(0, cap - (p.economy.dailyCoins || 0)));
        p.economy.coins       = (p.economy.coins       || 0) + awarded;
        p.economy.dailyCoins  = (p.economy.dailyCoins  || 0) + awarded;
        p.economy.totalEarned = (p.economy.totalEarned || 0) + awarded;
        p.economy.gems = Math.max(p.economy.gems || 0, Math.floor((p.economy.totalEarned || 0) / 40));
        if (awarded > 0) {
          p.coinHistory.push({ date: today, amount: awarded, soundId: dadWrongSession.soundId, source: 'dadwrong' });
        }
        updateStreak(p);
        saveActiveProfile();
        coinsEarned = awarded;
      }

      var stars = Math.min(5, score * 2);
      var emoji = score === total ? '🏆' : score >= total * 0.7 ? '🎉' : '💪';
      var msg   = score === total ? 'Perfect! Dad needs lessons from you!' :
                  score >= total * 0.7 ? 'Great work! You\'re a better speller than Dad!' :
                  'Good effort! Keep correcting Dad!';

      var container = $('s-dadwrong');
      container.innerHTML =
        '<button class="btn-back" data-back="s-play">← Back</button>' +
        '<div style="text-align:center;padding:20px 0;">' +
        '<div style="font-size:64px;">' + emoji + '</div>' +
        '<div class="done-stars" style="margin:8px 0;">' + starsHtml(stars) + '</div>' +
        '<h2 style="color:var(--pu3);">Dad corrected!</h2>' +
        '<p style="font-size:18px;font-weight:700;">' + score + ' of ' + total + ' fixed on first try</p>' +
        '<p style="color:var(--mut);">' + msg + '</p>' +
        (coinsEarned > 0 ? '<p style="color:var(--ye3);font-weight:800;font-size:18px;">🪙 +' + coinsEarned + ' coins!</p>' : '') +
        '<div style="margin-top:16px;background:rgba(255,255,255,0.9);border-radius:var(--radius-lg);padding:14px;">' +
        dadWrongSession.words.map(function(w) {
          return '<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(0,0,0,0.06);">' +
            '<span style="font-size:13px;color:var(--mut);">Dad wrote: <em>' + escapeHtml(w.wrong) + '</em></span>' +
            '<span style="font-weight:800;color:' + (w.firstTry ? 'var(--gn3)' : 'var(--pk3)') + ';">' +
            escapeHtml(w.correct) + ' ' + (w.firstTry ? '✅' : '📝') + '</span></div>';
        }).join('') +
        '</div>' +
        '<button class="btn" id="dw-again" style="width:100%;margin-top:16px;">Play again 🎲</button>' +
        '<button class="btn btn-secondary" id="dw-home" style="width:100%;margin-top:10px;">Back to home</button>' +
        '</div>';

      $('dw-again').addEventListener('click', function() { startDadWrongGame(dadWrongSession.soundId); });
      $('dw-home').addEventListener('click', function() { showScreen('s-home'); });
    }

    // Launch the correct game for the current world
    function launchWorldGame(type) {
      var p = activeProfile();
      if (!p) return;
      migrateAvatar(p);
      var ch = p.avatar.characterKey ? findCharacter(p.avatar.characterKey) : null;
      var bgKey = p.avatar.background ? p.avatar.background.replace('bg:', '') : null;
      var world = bgKey || (ch ? ch.world : 'beach');
      var wg = WORLD_GAMES[world] || WORLD_GAMES.beach;
      var game = (type === 'kindy') ? wg.kindy : wg.year2;

      // Kindy games go through the prep system
      if (type === 'kindy') {
        startPrepGame(game.mode);
        return;
      }

      // Year 2 games go through the play system
      var mode = game.mode;
      if (mode === 'thisweek') {
        var we = currentWeekEntry();
        if (we && we.soundId && !we.comingSoon) startGame(we.soundId, 'thisweek');
        else { var ids = Object.keys(SOUNDS); startGame(ids[Math.floor(Math.random() * ids.length)], 'surprise'); }
      } else if (mode === 'surprise') {
        var ids2 = Object.keys(SOUNDS);
        startGame(ids2[Math.floor(Math.random() * ids2.length)], 'surprise');
      } else if (mode === 'problems') {
        var seen = {};
        var problemWords = [];
        (p.mistakes || []).forEach(function(m) {
          if (seen[m.w]) return;
          seen[m.w] = true;
          var s = SOUNDS[m.soundId];
          if (!s) return;
          var entry = s.words.find(function(w) { return w.w === m.w; });
          if (entry) problemWords.push(entry);
        });
        if (problemWords.length > 0) startGame(p.mistakes[0].soundId, 'problems', problemWords);
        else { var ids3 = Object.keys(SOUNDS); startGame(ids3[Math.floor(Math.random() * ids3.length)], 'surprise'); }
      } else if (mode === 'choose') {
        showScreen('s-play');
        setTimeout(function() { renderSoundPicker(); }, 100);
      } else if (mode === 'sentences') {
        pendingSoundId = null;
        var weS = currentWeekEntry();
        if (weS && weS.soundId) pendingSoundId = weS.soundId;
        showScreen('s-sentences');
      } else if (mode === 'dadwrong') {
        var weD = currentWeekEntry();
        var dadSoundId = (weD && weD.soundId && !weD.comingSoon)
          ? weD.soundId
          : (function() { var ids = Object.keys(SOUNDS); return ids[Math.floor(Math.random() * ids.length)]; })();
        startDadWrongGame(dadSoundId);
      } else if (mode === 'boss') {
        startBossGame();
      }
    }

    // Global delegation for game buttons inside world view (survive re-renders)
    document.addEventListener('click', function(ev) {
      var gpBtn = ev.target.closest('[data-gameplay]');
      if (!gpBtn) return;
      ev.stopPropagation();
      ev.preventDefault();
      launchWorldGame(gpBtn.getAttribute('data-gameplay'));
    });

            'display:flex;flex-direction:column;align-items:center;padding:6px 4px;' +
