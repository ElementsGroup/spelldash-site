<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Spell Dash</title>

  <!-- Google Fonts: Fredoka One for headings, Nunito for body/UI -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* ============================================================
       Design tokens — pastel palette, three steps per family.
       ============================================================ */
    :root {
      --pk:  #FFB3C6;  --pk2: #FF85A1;  --pk3: #CC3060;
      --pu:  #D4AAEE;  --pu2: #B07DE0;  --pu3: #7830B8;
      --bl:  #A8D8F0;  --bl2: #5CB8E8;  --bl3: #2878B8;
      --ye:  #FFEC80;  --ye2: #F0BA00;  --ye3: #806800;
      --gn:  #B8EED8;  --gn2: #3CB87A;  --gn3: #1A6840;

      --bg:  #FDF0F6;
      --txt: #381540;
      --mut: #9070A0;
      --wh:  #FFFFFF;

      --radius-lg: 24px;
      --radius-md: 16px;
      --radius-sm: 10px;

      --shadow-soft: 0 6px 18px rgba(120, 48, 184, 0.12);
      --shadow-pop:  0 10px 28px rgba(204, 48, 96, 0.18);

      --tap-min: 54px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Nunito', system-ui, -apple-system, sans-serif;
      color: var(--txt);
      background: var(--bg);
      overscroll-behavior: none;
    }

    /* Pastel radial gradient — pink top-left, blue bottom-right, purple centre. */
    body {
      background:
        radial-gradient(circle at 12% 8%,  var(--pk)  0%, transparent 45%),
        radial-gradient(circle at 88% 92%, var(--bl)  0%, transparent 45%),
        radial-gradient(circle at 50% 50%, var(--pu)  0%, transparent 55%),
        var(--bg);
      min-height: 100vh;
    }

    /* App shell — iPad-first, capped width, centred. */
    .app {
      max-width: 500px;
      margin: 0 auto;
      padding: 20px 18px 40px;
      min-height: 100vh;
      position: relative;
    }

    /* ============================================================
       Typography helpers
       ============================================================ */
    h1, h2, h3 {
      font-family: 'Fredoka One', 'Nunito', sans-serif;
      font-weight: 400;
      letter-spacing: 0.2px;
      margin: 0 0 12px;
      color: var(--pu3);
    }
    h1 { font-size: 34px; }
    h2 { font-size: 24px; }
    h3 { font-size: 18px; color: var(--txt); }

    p { line-height: 1.45; }

    .muted { color: var(--mut); }
    .center { text-align: center; }

    /* ============================================================
       Buttons & inputs — large, touch-friendly.
       ============================================================ */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: var(--tap-min);
      padding: 0 22px;
      border: none;
      border-radius: var(--radius-md);
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 18px;
      cursor: pointer;
      box-shadow: var(--shadow-soft);
      transition: transform 80ms ease, box-shadow 120ms ease;
      color: var(--wh);
      background: linear-gradient(180deg, var(--pk2), var(--pk3));
    }
    .btn:active { transform: translateY(1px) scale(0.99); box-shadow: var(--shadow-pop); }

    .btn-secondary {
      background: var(--wh);
      color: var(--pu3);
      border: 2px solid var(--pu);
    }
    .btn-ghost {
      background: transparent;
      color: var(--pu3);
      box-shadow: none;
      font-weight: 700;
    }

    .btn-back {
      min-height: 44px;
      padding: 0 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.85);
      color: var(--pu3);
      font-weight: 800;
      box-shadow: var(--shadow-soft);
      border: none;
      font-size: 16px;
      margin-bottom: 16px;
      cursor: pointer;
    }

    .input {
      width: 100%;
      min-height: var(--tap-min);
      padding: 0 16px;
      border-radius: var(--radius-md);
      border: 2px solid var(--pu);
      background: var(--wh);
      font-family: 'Nunito', sans-serif;
      font-size: 18px;
      color: var(--txt);
      outline: none;
    }
    .input:focus { border-color: var(--pu2); box-shadow: 0 0 0 4px rgba(176,125,224,0.18); }

    /* ============================================================
       Screen container — only the active screen is shown.
       ============================================================ */
    .screen { display: none; animation: fadeIn 220ms ease-out; }
    .screen.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ============================================================
       Screen 1 — Profile select
       ============================================================ */
    .profile-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-top: 28px;
    }

    .profile-card {
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: var(--radius-lg);
      padding: 22px 14px 18px;
      text-align: center;
      box-shadow: var(--shadow-soft);
      cursor: pointer;
      user-select: none;
      transition: transform 120ms ease;
      min-height: 220px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .profile-card:active { transform: scale(0.98); }

    .avatar-circle {
      position: relative;
      width: 110px;
      height: 110px;
      border-radius: 50%;
      display: -webkit-flex;
      display: flex;
      -webkit-align-items: center;
      align-items: center;
      -webkit-justify-content: center;
      justify-content: center;
      font-family: 'Fredoka One', sans-serif;
      font-size: 42px;
      color: var(--wh);
      box-shadow: var(--shadow-pop);
    }
    .av-badge { position: absolute; width: 30%; height: 30%; border-radius: 50%; background: #fff; display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; -webkit-justify-content: center; justify-content: center; font-size: 52%; box-shadow: 0 2px 5px rgba(0,0,0,0.2); line-height: 1; }
    .av-acc { top: -5%; right: -5%; }
    .av-pet { bottom: -5%; right: -5%; }
    .avatar-pink   { background: linear-gradient(135deg, var(--pk2), var(--pk3)); }
    .avatar-blue   { background: linear-gradient(135deg, var(--bl2), var(--bl3)); }
    .avatar-purple { background: linear-gradient(135deg, var(--pu2), var(--pu3)); }
    .avatar-green  { background: linear-gradient(135deg, var(--gn2), var(--gn3)); }
    .avatar-yellow { background: linear-gradient(135deg, #FFD740, #E07A00); }
    .avatar-orange { background: linear-gradient(135deg, #FFB347, #D44000); }
    .avatar-red    { background: linear-gradient(135deg, #FF7070, #B81818); }
    .avatar-teal   { background: linear-gradient(135deg, #40D8C8, #0A8070); }

    .profile-name {
      font-family: 'Fredoka One', sans-serif;
      font-size: 22px;
      color: var(--pu3);
    }
    .profile-sub { font-size: 13px; color: var(--mut); }

    .name-entry {
      background: rgba(255,255,255,0.9);
      border-radius: var(--radius-lg);
      padding: 18px;
      margin-top: 18px;
      box-shadow: var(--shadow-soft);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .tagline {
      text-align: center;
      color: var(--pu3);
      font-weight: 700;
      margin: 4px 0 18px;
    }

    /* ============================================================
       Screen 2 — Home
       ============================================================ */
    .home-header {
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(255,255,255,0.75);
      border-radius: var(--radius-lg);
      padding: 14px 16px;
      box-shadow: var(--shadow-soft);
      margin-bottom: 16px;
    }
    .home-header .avatar-circle { width: 64px; height: 64px; font-size: 26px; }
    .home-header .who { display: flex; flex-direction: column; }
    .home-header .who .profile-name { font-size: 20px; }
    .home-header .who .profile-sub { font-size: 12px; }

    .stat-row {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .coin-card,
    .gem-card {
      background: rgba(255,255,255,0.85);
      border-radius: var(--radius-lg);
      padding: 14px 16px;
      box-shadow: var(--shadow-soft);
    }

    .coin-amount {
      font-family: 'Fredoka One', sans-serif;
      font-size: 32px;
      color: var(--ye3);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .progress-track {
      height: 10px;
      background: rgba(120,48,184,0.12);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--ye2), var(--pk2));
      width: 0%;
      transition: width 300ms ease;
    }
    .progress-label {
      font-size: 12px;
      color: var(--mut);
      margin-top: 6px;
    }

    .gem-card { display: flex; flex-direction: column; gap: 8px; }
    .gem-amount {
      font-family: 'Fredoka One', sans-serif;
      font-size: 24px;
      color: var(--pu3);
      display: flex; align-items: center; gap: 6px;
    }
    .streak {
      font-weight: 800;
      color: var(--pk3);
      display: flex; align-items: center; gap: 6px;
      font-size: 16px;
    }

    .tile-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .tile {
      background: rgba(255,255,255,0.9);
      border: none;
      border-radius: var(--radius-lg);
      padding: 18px 14px;
      min-height: 110px;
      box-shadow: var(--shadow-soft);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
      text-align: left;
      transition: transform 120ms ease;
      font-family: 'Nunito', sans-serif;
    }
    .tile:active { transform: scale(0.98); }
    .tile .icon { font-size: 36px; }
    .tile .label {
      font-family: 'Fredoka One', sans-serif;
      font-size: 20px;
      color: var(--pu3);
    }
    .tile .desc { font-size: 13px; color: var(--mut); }

    .tile.t-play     { background: linear-gradient(160deg, #FFFFFF 60%, var(--pk)); }
    .tile.t-sent     { background: linear-gradient(160deg, #FFFFFF 60%, var(--bl)); }
    .tile.t-read     { background: linear-gradient(160deg, #FFFFFF 60%, var(--gn)); }
    .tile.t-coins    { background: linear-gradient(160deg, #FFFFFF 60%, var(--ye)); }

    .avatar-room {
      margin-top: 12px;
      background: rgba(255,255,255,0.85);
      border-radius: var(--radius-lg);
      padding: 16px;
      box-shadow: var(--shadow-soft);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .avatar-room .icon { font-size: 30px; }
    .avatar-room .label {
      font-family: 'Fredoka One', sans-serif;
      font-size: 18px;
      color: var(--pu3);
    }
    .avatar-room .desc { font-size: 13px; color: var(--mut); }

    .week-track {
      margin-top: 16px;
      background: rgba(255,255,255,0.7);
      border-radius: var(--radius-lg);
      padding: 14px;
      box-shadow: var(--shadow-soft);
    }
    .week-track h3 { margin-bottom: 8px; }
    .dot-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 6px 2px 4px;
      scrollbar-width: none;
    }
    .dot-row::-webkit-scrollbar { display: none; }
    .week-dot {
      flex: 0 0 auto;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(176,125,224,0.25);
      border: 2px solid rgba(176,125,224,0.4);
    }
    .week-dot.done   { background: var(--gn2); border-color: var(--gn3); }
    .week-dot.active { background: var(--pk2); border-color: var(--pk3); transform: scale(1.15); }

    .drops-area {
      margin-top: 12px;
      min-height: 6px;
    }
    .drop-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--ye);
      color: var(--ye3);
      padding: 6px 12px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 13px;
      box-shadow: var(--shadow-soft);
    }

    /* ============================================================
       Stub placeholder card for not-yet-built screens.
       ============================================================ */
    .stub {
      background: rgba(255,255,255,0.85);
      border-radius: var(--radius-lg);
      padding: 22px;
      box-shadow: var(--shadow-soft);
      text-align: center;
    }
    .stub h2 { color: var(--pu3); }
    .stub p  { color: var(--mut); }

    /* ============================================================
       Stage 2/3 — Week badge, play hub, game screen.
       ============================================================ */

    /* Coming-soon week dot — dashed outline. */
    .week-dot.coming-soon {
      background: transparent;
      border: 2px dashed rgba(176,125,224,0.45);
    }

    /* Week badge below the dot track on Home. */
    .week-badge {
      display: flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(212,170,238,0.25));
      border-radius: var(--radius-lg);
      padding: 14px 16px;
      margin-top: 12px;
      box-shadow: var(--shadow-soft);
      border: 2px solid rgba(176,125,224,0.2);
    }
    .wb-emoji { font-size: 30px; flex: 0 0 auto; }
    .wb-text  { display: flex; flex-direction: column; gap: 2px; }
    .wb-text strong { font-family: 'Fredoka One', sans-serif; font-size: 16px; color: var(--pu3); }
    .wb-text span   { font-size: 13px; color: var(--mut); }

    /* ---- Play hub ---- */
    .play-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 16px;
    }
    .play-tile {
      background: rgba(255,255,255,0.92);
      border: none;
      border-radius: var(--radius-lg);
      padding: 20px 16px;
      min-height: 150px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
      text-align: left;
      box-shadow: var(--shadow-soft);
      transition: transform 120ms ease;
      font-family: 'Nunito', sans-serif;
    }
    .play-tile:active   { transform: scale(0.97); }
    .play-tile:disabled { opacity: 0.5; cursor: default; }
    .pt-icon  { font-size: 34px; }
    .pt-label { font-family: 'Fredoka One', sans-serif; font-size: 18px; color: var(--pu3); }
    .pt-sub   { font-size: 13px; color: var(--mut); line-height: 1.3; }
    .pt-coins { font-size: 12px; color: var(--ye3); font-weight: 800; margin-top: auto; padding-top: 6px; }
    .pt-week   { background: linear-gradient(150deg, #fff 50%, var(--pk)  140%); }
    .pt-surp   { background: linear-gradient(150deg, #fff 50%, var(--pu)  140%); }
    .pt-prob   { background: linear-gradient(150deg, #fff 50%, var(--ye)  140%); }
    .pt-choose { background: linear-gradient(150deg, #fff 50%, var(--bl)  140%); }
    .pt-sent   { background: linear-gradient(150deg, #fff 50%, var(--gn)  140%); }
    .pt-dad    { background: linear-gradient(150deg, #fff 50%, #FFD6A5    140%); }
    .pt-boss   { background: linear-gradient(150deg, #fff 50%, #FFD740    140%); }

    /* ---- Daddy Got It Wrong game ---- */
    .dad-bubble { background: #FFF3CD; border: 2px solid #F0BA00; border-radius: var(--radius-lg); border-bottom-left-radius: 4px; padding: 18px 20px; margin: 4px 0 18px; position: relative; }
    .dad-bubble::before { content: '👨'; font-size: 28px; position: absolute; left: -14px; bottom: -14px; }
    .dad-wrong-word { font-family: 'Fredoka One', sans-serif; font-size: 38px; color: var(--pk3); letter-spacing: 1px; }
    .dad-feedback { text-align: center; font-size: 26px; min-height: 36px; font-weight: 800; }
    .dad-progress { font-size: 13px; color: var(--mut); text-align: center; margin-bottom: 6px; }
    .dw-hint { background: rgba(255,243,205,0.7); border-left: 3px solid #F0BA00; border-radius: 0 var(--radius-md) var(--radius-md) 0; padding: 8px 12px; font-size: 13px; color: var(--txt); margin-bottom: 4px; }

    /* ---- Sound picker ---- */
    .sound-picker { margin-top: 18px; background: rgba(255,255,255,0.96); border-radius: var(--radius-lg); padding: 18px; box-shadow: var(--shadow-pop); }
    .sound-picker h3 { margin-bottom: 12px; }
    .sound-picker.hidden { display: none; }
    .picker-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .picker-card {
      border: none;
      background: rgba(212,170,238,0.15);
      border-radius: var(--radius-md);
      padding: 14px 12px;
      min-height: 80px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
      box-shadow: var(--shadow-soft);
      transition: transform 100ms ease;
      font-family: 'Nunito', sans-serif;
    }
    .picker-card:active { transform: scale(0.97); background: var(--pu); color: #fff; }
    .pc-icon { font-size: 24px; }
    .pc-name { font-size: 14px; font-weight: 700; color: var(--pu3); line-height: 1.25; }

    /* ---- Game screen ---- */
    #s-game { padding-bottom: 60px; }

    .phase-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 16px; }
    .phase-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: rgba(176,125,224,0.2);
      border: 2px solid rgba(176,125,224,0.35);
      transition: all 200ms ease;
    }
    .phase-dot.pd-active { background: var(--pu2); border-color: var(--pu3); transform: scale(1.35); }
    .phase-dot.pd-done   { background: var(--gn2); border-color: var(--gn3); }

    .game-content { display: flex; flex-direction: column; gap: 12px; }

    .game-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.82);
      border-radius: var(--radius-md);
      padding: 10px 14px;
      box-shadow: var(--shadow-soft);
    }
    .gh-sound { font-family: 'Fredoka One', sans-serif; font-size: 17px; color: var(--pu3); }
    .gh-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
    .gh-stars { font-size: 20px; letter-spacing: 1px; }
    .coin-timer { font-size: 12px; font-weight: 700; color: var(--ye3); background: var(--ye); padding: 3px 9px; border-radius: 999px; }
    .score-badge { text-align: center; font-size: 13px; color: var(--mut); font-weight: 700; }

    /* ---- Comparison panel ---- */
    .compare-panel { background: rgba(255,255,255,0.96); border-radius: var(--radius-lg); padding: 20px 18px; box-shadow: var(--shadow-soft); display: flex; flex-direction: column; gap: 12px; }
    .compare-cue   { font-size: 15px; color: var(--mut); font-style: italic; margin: 0; }
    .compare-title { font-family: 'Fredoka One', sans-serif; font-size: 20px; color: var(--pu3); }
    .compare-teams { display: flex; gap: 8px; flex-wrap: wrap; }
    .compare-team  { flex: 1 1 80px; border-radius: var(--radius-sm); padding: 10px; display: flex; flex-direction: column; gap: 2px; font-size: 13px; }
    .compare-team strong { font-size: 18px; font-family: 'Fredoka One', sans-serif; }
    .compare-words { display: flex; gap: 8px; flex-wrap: wrap; }
    .compare-word  { border: none; background: rgba(176,125,224,0.12); border-radius: var(--radius-sm); padding: 8px 14px; min-height: 44px; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 16px; color: var(--pu3); cursor: pointer; }
    .compare-word:active { background: var(--pu2); color: #fff; }
    .compare-lesson { font-size: 14px; color: var(--txt); background: var(--ye); border-radius: var(--radius-sm); padding: 10px 12px; margin: 0; }
    #compare-go { width: 100%; }

    /* ---- Game card (shared by choose + fix rounds) ---- */
    .game-card {
      background: #fff;
      border-radius: var(--radius-lg);
      padding: 22px 18px 18px;
      box-shadow: var(--shadow-pop);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .word-display {
      font-family: 'Fredoka One', sans-serif;
      font-size: 46px;
      color: var(--pu3);
      text-align: center;
      letter-spacing: 2px;
      line-height: 1.1;
    }
    .word-display .gap { color: var(--pk3); font-style: italic; }
    .speaker-btn { border: none; background: linear-gradient(135deg, var(--bl), var(--bl2)); border-radius: 50%; width: 56px; height: 56px; font-size: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-soft); flex-shrink: 0; }
    .speaker-btn:active { transform: scale(0.92); }
    .word-hint { font-size: 15px; color: var(--mut); font-style: italic; text-align: center; margin: 0; }

    /* Team answer buttons */
    .team-grid-row { display: flex; gap: 10px; width: 100%; flex-wrap: wrap; }
    .team-grid-2x2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
    .team-btn {
      border: none;
      border-radius: var(--radius-md);
      min-height: var(--tap-min);
      padding: 10px 14px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      box-shadow: var(--shadow-soft);
      transition: transform 100ms ease;
      font-family: 'Nunito', sans-serif;
      flex: 1 1 0;
    }
    .team-btn:active   { transform: scale(0.96); }
    .team-btn:disabled { opacity: 0.45; }
    .team-btn strong   { font-family: 'Fredoka One', sans-serif; font-size: 22px; display: block; }
    .team-btn small    { font-size: 11px; line-height: 1.3; }

    /* Fix Dad mode */
    .fix-label    { font-size: 12px; font-weight: 800; color: var(--mut); text-transform: uppercase; letter-spacing: 1px; }
    .fix-misspell { font-family: 'Fredoka One', sans-serif; font-size: 38px; color: var(--pk3); text-decoration: line-through; text-decoration-color: var(--pk2); text-align: center; }
    .fix-grid     { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
    .fix-opt      { border: 2px solid rgba(176,125,224,0.3); background: rgba(255,255,255,0.95); border-radius: var(--radius-md); min-height: var(--tap-min); padding: 8px 12px; cursor: pointer; font-family: 'Fredoka One', sans-serif; font-size: 20px; color: var(--pu3); display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-soft); transition: transform 100ms ease; }
    .fix-opt:active   { transform: scale(0.97); background: var(--pu); color: #fff; border-color: var(--pu3); }
    .fix-opt:disabled { opacity: 0.45; }

    /* Feedback bubble */
    .feedback-bubble { border-radius: var(--radius-md); padding: 12px 16px; font-weight: 700; font-size: 15px; text-align: center; animation: feedPop 180ms ease-out; }
    .feedback-correct { background: var(--gn); color: var(--gn3); border: 2px solid var(--gn2); }
    .feedback-wrong   { background: var(--pk); color: var(--pk3); border: 2px solid var(--pk2); }
    @keyframes feedPop { from { transform: scale(0.88); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    /* Say Why */
    .say-why-card { background: rgba(255,255,255,0.96); border-radius: var(--radius-lg); padding: 16px; box-shadow: var(--shadow-soft); animation: fadeIn 200ms ease-out; }
    .say-why-q    { font-size: 15px; color: var(--txt); margin: 0 0 10px; text-align: center; }
    .say-why-opts { display: flex; flex-direction: column; gap: 8px; }
    .say-why-btn  { border: 2px solid var(--pu); background: rgba(212,170,238,0.1); border-radius: var(--radius-md); min-height: var(--tap-min); padding: 0 14px; cursor: pointer; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 15px; color: var(--pu3); text-align: left; transition: background 100ms; }
    .say-why-btn:active { background: var(--pu2); color: #fff; border-color: var(--pu3); }

    /* Done screen */
    .done-screen { background: rgba(255,255,255,0.96); border-radius: var(--radius-lg); padding: 28px 20px; box-shadow: var(--shadow-pop); text-align: center; display: flex; flex-direction: column; align-items: center; gap: 14px; }
    .done-stars  { font-size: 40px; letter-spacing: 4px; }
    .done-msg    { font-size: 26px; color: var(--pu3); margin: 0; }
    .done-score  { font-size: 16px; color: var(--mut); margin: 0; }
    .done-coins  { font-size: 16px; color: var(--ye3); margin: 0; font-weight: 700; }
    .cap-msg     { font-size: 14px; color: var(--pk3); font-style: italic; margin: 0; }
    #done-home, #done-again { width: 100%; }

    /* Surprise drop */
    .drop-modal { background: linear-gradient(135deg, var(--pu), var(--pk)); border-radius: var(--radius-lg); padding: 18px; color: #fff; width: 100%; text-align: center; }
    .drop-modal p { margin: 0; font-weight: 700; font-size: 15px; }
    .drop-modal small { font-weight: 400; opacity: 0.88; }
    .drop-box { font-size: 46px; animation: dropBounce 600ms ease infinite alternate; display: block; }
    @keyframes dropBounce { from { transform: translateY(0); } to { transform: translateY(-8px); } }

    /* ============================================================
       Stage 4 — Sentences, Reading, Coins, Ask Dad
       ============================================================ */

    /* ---- Sentences ---- */
    .sentences-screen { display: flex; flex-direction: column; gap: 14px; }
    .starter-card { background: rgba(255,255,255,0.96); border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow-pop); display: flex; flex-direction: column; gap: 10px; }
    .starter-label { font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--mut); }
    .starter-text { font-family: 'Fredoka One', sans-serif; font-size: 22px; color: var(--pu3); margin: 0; }
    .sentence-input { width: 100%; min-height: 80px; padding: 12px 16px; border-radius: var(--radius-md); border: 2px solid var(--pu); background: var(--wh); font-family: 'Nunito', sans-serif; font-size: 17px; color: var(--txt); outline: none; resize: none; }
    .sentence-input:focus { border-color: var(--pu2); box-shadow: 0 0 0 4px rgba(176,125,224,0.18); }
    .star-ladder { display: flex; gap: 6px; }
    .sl-step { flex: 1; height: 8px; border-radius: 999px; background: rgba(176,125,224,0.18); transition: background 220ms ease; }
    .sl-step.earned { background: var(--ye2); }
    .star-score { font-family: 'Fredoka One', sans-serif; font-size: 22px; color: var(--ye3); text-align: center; }
    .sentence-tip { font-size: 13px; color: var(--mut); font-style: italic; margin: 0; }
    .sentences-done { background: rgba(255,255,255,0.96); border-radius: var(--radius-lg); padding: 28px 20px; box-shadow: var(--shadow-pop); text-align: center; display: flex; flex-direction: column; align-items: center; gap: 14px; }

    /* ---- Reading ---- */
    .tab-row { display: flex; gap: 8px; margin-bottom: 16px; }
    .tab-btn { flex: 1; min-height: var(--tap-min); border: 2px solid var(--pu); border-radius: var(--radius-md); background: var(--wh); color: var(--pu3); font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 16px; cursor: pointer; transition: all 120ms ease; }
    .tab-btn.active { background: var(--pu2); color: #fff; border-color: var(--pu3); }
    .reading-form { background: rgba(255,255,255,0.96); border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow-soft); display: flex; flex-direction: column; gap: 12px; }
    .field-label { font-size: 13px; font-weight: 800; color: var(--mut); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .reading-preview { background: var(--ye); border-radius: var(--radius-sm); padding: 10px 14px; font-size: 14px; font-weight: 700; color: var(--ye3); text-align: center; }
    .reading-entry { background: rgba(255,255,255,0.96); border-radius: var(--radius-md); padding: 14px 16px; box-shadow: var(--shadow-soft); display: flex; justify-content: space-between; align-items: center; gap: 10px; border-left: 4px solid var(--gn2); margin-bottom: 10px; }
    .re-title { font-weight: 800; color: var(--txt); font-size: 16px; }
    .re-meta { font-size: 13px; color: var(--mut); }
    .re-coins { font-size: 13px; font-weight: 800; color: var(--ye3); flex-shrink: 0; }

    /* ---- Coins ---- */
    .coin-hero { background: linear-gradient(135deg, var(--ye), var(--ye2)); border-radius: var(--radius-lg); padding: 28px 20px; text-align: center; box-shadow: var(--shadow-pop); }
    .coin-hero-amt { font-family: 'Fredoka One', sans-serif; font-size: 64px; color: var(--ye3); line-height: 1; }
    .coin-hero-label { font-size: 16px; color: var(--ye3); opacity: 0.85; margin-top: 4px; }
    .coin-section { background: rgba(255,255,255,0.9); border-radius: var(--radius-lg); padding: 18px; box-shadow: var(--shadow-soft); margin-top: 14px; }
    .coin-section h3 { margin-bottom: 12px; }
    .coin-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(176,125,224,0.12); font-size: 15px; }
    .coin-row:last-child { border-bottom: none; }
    .coin-row-val { font-weight: 800; color: var(--ye3); }
    .gems-display { display: flex; align-items: center; gap: 12px; }
    .gems-big { font-family: 'Fredoka One', sans-serif; font-size: 36px; color: var(--pu3); }
    .gems-sub { font-size: 13px; color: var(--mut); line-height: 1.5; }

    /* ---- Ask Dad ---- */
    .askdad-card { background: rgba(255,255,255,0.96); border-radius: var(--radius-lg); padding: 24px 20px; box-shadow: var(--shadow-pop); text-align: center; display: flex; flex-direction: column; align-items: center; gap: 14px; }
    .askdad-emoji { font-size: 56px; }
    .askdad-title { font-family: 'Fredoka One', sans-serif; font-size: 26px; color: var(--pu3); margin: 0; }
    .askdad-body { font-size: 16px; color: var(--txt); line-height: 1.45; margin: 0; }
    .askdad-pending { background: var(--ye); border-radius: var(--radius-md); padding: 12px 18px; font-size: 15px; font-weight: 700; color: var(--ye3); width: 100%; text-align: center; }
    .reward-opts { display: flex; flex-direction: column; gap: 10px; width: 100%; }
    .reward-opt { background: rgba(212,170,238,0.15); border: 2px solid var(--pu); border-radius: var(--radius-md); min-height: var(--tap-min); padding: 0 16px; cursor: pointer; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 16px; color: var(--pu3); text-align: left; display: flex; justify-content: space-between; align-items: center; width: 100%; transition: background 100ms; }
    .reward-opt:active:not([disabled]) { background: var(--pu2); color: #fff; border-color: var(--pu3); }
    .reward-cost { font-size: 14px; font-weight: 800; color: var(--ye3); }
    .confetti-area { position: relative; overflow: hidden; }
    .conf-bit { position: absolute; width: 8px; height: 8px; border-radius: 2px; }
    @keyframes confettiFall { 0% { transform: translateY(-20px) rotate(0deg); opacity: 1; } 100% { transform: translateY(140px) rotate(360deg); opacity: 0; } }

    /* ============================================================
       Stage 5 — Word Wall, Settings, Polish
       ============================================================ */

    /* ---- Home — secondary nav row ---- */
    .home-nav-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
    .home-nav-btn { background: rgba(255,255,255,0.88); border: none; border-radius: var(--radius-lg); padding: 14px 14px; min-height: var(--tap-min); cursor: pointer; display: flex; align-items: center; gap: 10px; box-shadow: var(--shadow-soft); transition: transform 120ms ease; font-family: 'Nunito', sans-serif; text-align: left; }
    .home-nav-btn:active { transform: scale(0.98); }
    .hnb-icon  { font-size: 26px; }
    .hnb-label { font-family: 'Fredoka One', sans-serif; font-size: 17px; color: var(--pu3); display: block; }
    .hnb-desc  { font-size: 12px; color: var(--mut); display: block; }

    /* ---- Word Wall ---- */
    .wall-summary { background: rgba(255,255,255,0.9); border-radius: var(--radius-lg); padding: 14px 18px; box-shadow: var(--shadow-soft); margin-bottom: 16px; text-align: center; }
    .wall-count { font-family: 'Fredoka One', sans-serif; font-size: 26px; color: var(--pu3); }
    .wall-section { background: rgba(255,255,255,0.85); border-radius: var(--radius-lg); padding: 18px; box-shadow: var(--shadow-soft); margin-bottom: 14px; }
    .wall-section-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .wall-section-emoji { font-size: 26px; }
    .wall-section-name { font-family: 'Fredoka One', sans-serif; font-size: 17px; color: var(--pu3); }
    .wall-team { margin-bottom: 10px; }
    .wall-team:last-child { margin-bottom: 0; }
    .wall-team-label { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--mut); margin-bottom: 6px; }
    .word-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .word-chip { border-radius: 999px; padding: 6px 14px; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 14px; display: inline-flex; align-items: center; }
    .wall-empty-sound { color: var(--mut); font-size: 13px; font-style: italic; margin: 0; }

    /* ---- Settings ---- */
    .settings-section { background: rgba(255,255,255,0.9); border-radius: var(--radius-lg); padding: 18px; box-shadow: var(--shadow-soft); margin-bottom: 14px; }
    .settings-section h3 { margin-bottom: 14px; }
    .settings-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 8px 0; border-bottom: 1px solid rgba(176,125,224,0.12); }
    .settings-row:last-child { border-bottom: none; }
    .settings-label { font-size: 15px; font-weight: 700; color: var(--txt); }
    .settings-sub { font-size: 12px; color: var(--mut); }
    .level-tabs { display: flex; gap: 8px; }
    .level-tab { flex: 1; min-height: 44px; border: 2px solid var(--pu); border-radius: var(--radius-md); background: var(--wh); color: var(--pu3); font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 14px; cursor: pointer; transition: all 120ms ease; }
    .level-tab.active { background: var(--pu2); color: #fff; border-color: var(--pu3); }
    .week-grid-sett { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 4px; }
    .week-card { border: 2px solid var(--pu); border-radius: var(--radius-md); padding: 12px; cursor: pointer; background: rgba(212,170,238,0.1); transition: all 120ms ease; font-family: 'Nunito', sans-serif; }
    .week-card.active { background: var(--pu2); color: #fff; border-color: var(--pu3); }
    .week-card.coming-soon { opacity: 0.45; cursor: default; border-style: dashed; }
    .wc-emoji { font-size: 22px; display: block; }
    .wc-label { font-family: 'Fredoka One', sans-serif; font-size: 15px; display: block; margin-top: 4px; }
    .wc-sub { font-size: 12px; color: var(--mut); display: block; }
    .week-card.active .wc-sub { color: rgba(255,255,255,0.8); }
    .custom-word-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid rgba(176,125,224,0.1); }
    .custom-word-row:last-child { border-bottom: none; }
    .cw-text { flex: 1; font-weight: 700; color: var(--txt); font-size: 15px; }
    .cw-meta { font-size: 12px; color: var(--mut); }
    .del-btn { border: none; background: var(--pk); color: var(--pk3); border-radius: 50%; width: 32px; height: 32px; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .del-btn:active { background: var(--pk2); }
    .danger-zone { border: 2px solid rgba(204,48,96,0.3) !important; }
    .info-card { background: rgba(212,170,238,0.12); border-radius: var(--radius-md); padding: 14px 16px; font-size: 14px; color: var(--txt); line-height: 1.5; border-left: 4px solid var(--pu2); }
    .redemption-row { padding: 8px 0; border-bottom: 1px solid rgba(176,125,224,0.1); font-size: 14px; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .redemption-row:last-child { border-bottom: none; }
    .input-sm { min-height: 44px; width: 90px; padding: 0 12px; border-radius: var(--radius-md); border: 2px solid var(--pu); background: var(--wh); font-family: 'Nunito', sans-serif; font-size: 16px; color: var(--txt); outline: none; text-align: center; }
    .input-sm:focus { border-color: var(--pu2); box-shadow: 0 0 0 3px rgba(176,125,224,0.15); }
    .add-custom-form { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(176,125,224,0.15); }
    .select-input { min-height: 44px; padding: 0 12px; border-radius: var(--radius-md); border: 2px solid var(--pu); background: var(--wh); font-family: 'Nunito', sans-serif; font-size: 16px; color: var(--txt); outline: none; width: 100%; }
    .select-input:focus { border-color: var(--pu2); }

    /* ---- Sentence star display (improved) ---- */
    .star-big { font-size: 44px; text-align: center; letter-spacing: 3px; min-height: 52px; display: block; transition: transform 180ms ease; }
    .star-big.pulse { animation: starPulse 300ms ease-out; }
    .sc-guide { display: flex; flex-direction: column; gap: 6px; margin: 2px 0 4px; }
    .sc-row { display: -webkit-flex; display: flex; -webkit-align-items: flex-start; align-items: flex-start; gap: 8px; padding: 7px 10px; border-radius: var(--radius-md); background: rgba(176,125,224,0.07); border: 1.5px solid transparent; transition: background 180ms, border-color 180ms; }
    .sc-row.sc-met { background: rgba(80,200,100,0.12); border-color: rgba(80,200,100,0.4); }
    .sc-row.sc-dim { opacity: 0.5; }
    .sc-tick { font-size: 16px; flex-shrink: 0; line-height: 1.4; }
    .sc-stars { font-size: 11px; flex-shrink: 0; letter-spacing: 1px; margin-top: 2px; min-width: 52px; }
    .sc-text { font-size: 13px; color: var(--txt); line-height: 1.4; }
    .sc-text strong { color: var(--pu3); }
    .sc-eg { color: var(--mut); font-size: 12px; }
    @keyframes starPulse { 0% { transform: scale(1); } 50% { transform: scale(1.18); } 100% { transform: scale(1); } }
    .star-tip { font-size: 14px; color: var(--pu3); font-weight: 700; text-align: center; min-height: 20px; margin-top: 4px; }

    /* ---- Drop emoji picker ---- */
    .drop-emoji-row { display: flex; justify-content: center; gap: 12px; margin-top: 10px; }
    .drop-emoji-btn { font-size: 36px; border: 3px solid transparent; border-radius: var(--radius-md); padding: 8px 12px; background: rgba(255,255,255,0.25); cursor: pointer; transition: transform 100ms ease, border-color 100ms; min-height: 54px; }
    .drop-emoji-btn:active { transform: scale(1.12); border-color: rgba(255,255,255,0.8); }

    /* ---- Avatar Room ---- */
    .avatar-preview-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 20px; background: rgba(255,255,255,0.96); border-radius: var(--radius-lg); box-shadow: var(--shadow-pop); }
    .avatar-preview-big { width: 100px; height: 100px; font-size: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-pop); }
    .colour-row { display: flex; gap: 10px; }
    .colour-swatch { width: 44px; height: 44px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; transition: transform 120ms ease, border-color 120ms; }
    .colour-swatch.selected { border-color: var(--txt); transform: scale(1.15); }
    .colour-swatch:active { transform: scale(1.1); }
    .emoji-section { background: rgba(255,255,255,0.9); border-radius: var(--radius-lg); padding: 18px; box-shadow: var(--shadow-soft); }
    .emoji-section h3 { margin-bottom: 12px; }
    .emoji-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
    .emoji-btn { font-size: 28px; border: 3px solid transparent; border-radius: var(--radius-md); padding: 6px; min-height: 54px; background: rgba(212,170,238,0.12); cursor: pointer; transition: transform 100ms ease; display: flex; align-items: center; justify-content: center; }
    .emoji-btn.selected { border-color: var(--pu3); background: var(--pu); }
    .emoji-btn:active { transform: scale(1.1); }
    .emoji-locked { opacity: 0.3; cursor: default; filter: grayscale(1); }

    /* ---- Avatar Room tabs ---- */
    .ar-tabs { display: -webkit-flex; display: flex; gap: 6px; margin: 14px 0 0; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .ar-tab { -webkit-flex: 1; flex: 1; min-width: 72px; padding: 8px 4px; border: 2px solid var(--pu2); border-radius: var(--radius-md); background: rgba(255,255,255,0.7); font-family: 'Fredoka One', sans-serif; font-size: 13px; color: var(--pu3); cursor: pointer; white-space: nowrap; transition: background 120ms, transform 80ms; }
    .ar-tab.active { background: var(--pu); border-color: var(--pu3); color: var(--wh); }
    .ar-tab:active { transform: scale(0.97); }
    .ar-panel { background: rgba(255,255,255,0.92); border-radius: var(--radius-lg); padding: 16px; margin-top: 10px; box-shadow: var(--shadow-soft); }
    .ar-item-hint { font-size: 13px; font-weight: 700; color: var(--pu3); text-align: center; background: rgba(176,125,224,0.12); border-radius: var(--radius-md); padding: 8px 12px; margin-bottom: 4px; }
    .ar-item-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
    .ar-item-btn { position: relative; font-size: 28px; border: 3px solid transparent; border-radius: var(--radius-md); padding: 6px 4px; min-height: 52px; background: rgba(212,170,238,0.12); cursor: pointer; transition: transform 100ms ease; display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; -webkit-justify-content: center; justify-content: center; }
    .ar-item-btn.selected { border-color: var(--pu3); background: var(--pu); }
    .ar-item-btn.locked { opacity: 0.32; -webkit-filter: grayscale(1); filter: grayscale(1); }
    .ar-item-btn:active { transform: scale(1.1); }
    .ar-lock { position: absolute; bottom: 1px; right: 2px; font-size: 10px; line-height: 1; }
    .avatar-circle svg { display: block; width: 100%; height: 100%; }
    .ar-section-title { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; color: var(--pu3); margin: 14px 0 7px; }
    .ar-choice-row { display: -webkit-flex; display: flex; gap: 10px; margin-bottom: 4px; }
    .ar-choice-btn { -webkit-flex: 1; flex: 1; padding: 11px 8px; border: 2.5px solid var(--pu2); border-radius: var(--radius-md); background: rgba(212,170,238,0.1); font-family: 'Fredoka One', sans-serif; font-size: 15px; color: var(--pu3); cursor: pointer; transition: background 120ms, transform 80ms; }
    .ar-choice-btn.selected { background: var(--pu); border-color: var(--pu3); color: var(--wh); }
    .ar-choice-btn:active { transform: scale(0.97); }
    .ar-swatch-row { display: -webkit-flex; display: flex; -webkit-flex-wrap: wrap; flex-wrap: wrap; gap: 10px; margin-bottom: 4px; }
    .ar-swatch { width: 38px; height: 38px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; transition: transform 100ms, border-color 100ms; outline: none; box-shadow: 0 2px 6px rgba(0,0,0,0.18); }
    .ar-swatch.selected { border-color: var(--txt); transform: scale(1.18); box-shadow: 0 3px 10px rgba(0,0,0,0.28); }
    .ar-swatch:active { transform: scale(1.1); }
    .ar-style-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 4px; }
    .ar-style-btn { padding: 9px 6px; border: 2px solid var(--pu2); border-radius: var(--radius-sm); background: rgba(212,170,238,0.1); font-family: 'Fredoka One', sans-serif; font-size: 13px; color: var(--pu3); cursor: pointer; transition: background 100ms, transform 80ms; }
    .ar-style-btn.selected { background: var(--pu); border-color: var(--pu3); color: var(--wh); }
    .ar-style-btn:active { transform: scale(0.96); }
    .ar-gem-balance { display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; gap: 8px; background: rgba(212,170,238,0.18); border-radius: var(--radius-md); padding: 10px 14px; margin-bottom: 4px; }

    /* ---- Prep Games ---- */

    .prep-btn:active { transform: scale(0.94); }

<body>
  <div class="app" id="app">

  <script>
    // ============================================================
    // Spell Dash — Stage 1 foundation.
    // No game logic, no word data yet. Just profiles, navigation,
    // voice setup, and the encouragement message bank.
    // ============================================================

    // -----------------------------------
    // Storage helpers — single localStorage key.
    // -----------------------------------
    var STORAGE_KEY = 'spelldash-profiles';

    // Default profile shape — used for fresh slots.
    function freshProfile(name) {
      return {
        name: name || '',
        avatar: { gender: 'girl', skinKey: 'light', hairStyle: 'long', hairColour: 'brown', eyeColour: 'blue', shirtColour: 'pink', unlocked: [], accessory: null, pet: null, hat: null, hairAcc: null, outfit: null, bag: null },
        weekKey: '',
        level: 'core',
        minsPerPage: 1,
        totalSessions: 0,
        lastPlayDate: null,
        completedWeeks: [],
        mistakes: [],
        wall: {},
        customWords: [],
        economy: {
          coins: 0,
          gems: 0,
          dailyCoins: 0,
          dailyDate: null,
          totalEarned: 0
        },
        coinHistory: [],
        redemptions: [],
        readingLog: [],
        drops: []
      };
    }

    // Always returns an array of length 2 (the two slots).
    function loadProfiles() {
      try {
        var raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return [null, null];
        var data = JSON.parse(raw);
        if (!Array.isArray(data)) return [null, null];
        // Pad / trim to exactly two slots.
        while (data.length < 2) data.push(null);
        return data.slice(0, 2);
      } catch (err) {
        console.warn('[Spell Dash] Could not load profiles:', err);
        return [null, null];
      }
    }

    function saveProfiles(profiles) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(profiles));
      } catch (err) {
        console.warn('[Spell Dash] Could not save profiles:', err);
      }
    }

    // -----------------------------------
    // App state — kept simple at this stage.
    // -----------------------------------
    var state = {
      profiles: loadProfiles(),
      activeIndex: null
    };

    // -----------------------------------
    // Encouragement message bank (Stage 1 init only — used in later stages).
    // -----------------------------------
    var CORRECT_MESSAGES = [
      '🌟 Brilliant!',
      '⭐ Correct!',
      '✨ Nailed it!',
      '🎉 Yes!',
      '💜 Superstar!',
      '🔥 On fire!',
      '🏆 Champion!',
      '⚡ Amazing!'
    ];

    // Wrong-answer text is always warm and explanatory.
    // Format: "Good try — your ears did their job! [word] belongs with the [team] family: [family examples]"
    function buildWrongMessage(word, team, familyExamples) {
      return 'Good try — your ears did their job! ' +
             word + ' belongs with the ' + team + ' family: ' + familyExamples;
    }

    var SESSION_COMPLETE_MESSAGES = [
      'Amazing work!',
      "You're a star!",
      'Spelling superstar!',
      'Brilliant effort!',
      'You absolutely smashed it!'
    ];

    // -----------------------------------
    // Australian voice setup.
    // -----------------------------------
    var ausVoice = null;
    var voiceAvailable = ('speechSynthesis' in window);

    function initVoice() {
      if (!voiceAvailable) return;
      var voices = speechSynthesis.getVoices();
      ausVoice = voices.find(function (v) { return v.lang === 'en-AU' && v.localService; })
              || voices.find(function (v) { return v.lang === 'en-AU'; })
              || voices.find(function (v) { return v.lang.indexOf('en-') === 0 && v.localService; })
              || voices.find(function (v) { return v.lang.indexOf('en') === 0; });
    }

    if (voiceAvailable) {
      speechSynthesis.addEventListener('voiceschanged', initVoice);
      initVoice();
    }

    // Speak helper — always tags Australian English.
    // Hides speaker buttons gracefully if speechSynthesis is unavailable.
    function speak(text, rate) {
      if (!voiceAvailable) return;
      try {
        var u = new SpeechSynthesisUtterance(text);
        u.lang = 'en-AU';
        u.rate = (typeof rate === 'number') ? rate : 0.82;
        if (ausVoice) u.voice = ausVoice;
        speechSynthesis.cancel();
        speechSynthesis.speak(u);
      } catch (err) {
        console.warn('[Spell Dash] speak failed:', err);
      }
    }

    // If speech synthesis is missing, hide any element marked .speaker-btn.
    if (!voiceAvailable) {
      document.documentElement.classList.add('no-voice');
      var styleEl = document.createElement('style');
      styleEl.textContent = '.no-voice .speaker-btn { display: none !important; }';
      document.head.appendChild(styleEl);
    }

    // -----------------------------------
    // Tiny helpers
    // -----------------------------------
    function $(id) { return document.getElementById(id); }
    function initialsOf(name) {
      if (!name) return '??';
      var parts = name.trim().split(/\s+/);
      var first = parts[0] ? parts[0].charAt(0) : '';
      var second = parts[1] ? parts[1].charAt(0) : (parts[0] && parts[0].length > 1 ? parts[0].charAt(1) : '');
      return (first + second).toUpperCase();
    }

    // ---- Avatar character customisation constants ----
    var SKIN_TONES = [
      { key: 'porcelain', hex: '#FDE8D5', hi: '#FFF3EC', sh: '#E8C4AA', label: 'Porcelain' },
      { key: 'light',     hex: '#FDDBB4', hi: '#FEE8CC', sh: '#D4A67A', label: 'Light' },
      { key: 'warm',      hex: '#F1C27D', hi: '#F8D8A4', sh: '#C89650', label: 'Warm' },
      { key: 'medium',    hex: '#D4956A', hi: '#E0AC84', sh: '#A87044', label: 'Medium' },
      { key: 'tan',       hex: '#B07040', hi: '#C48A5A', sh: '#8A5028', label: 'Tan' },
      { key: 'dark',      hex: '#8D5524', hi: '#A06E3C', sh: '#6A3810', label: 'Dark' }
    ];

    function renderAvatar(config, size) {
      var w = size || 120;
      var h = Math.round(w * 1.5);
      var av = {};
      for (var k in config) { if (config.hasOwnProperty(k)) av[k] = config[k]; }
      var svgBody = buildFullBodySVG(av, { platform: true });
      var petSvg = '';
      if (av.svgPet && av.svgPet !== 'none') {
        petSvg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="-30 -30 60 30" width="' + Math.round(w * 0.6) + '" height="' + Math.round(w * 0.4) + '" style="position:absolute;bottom:4%;right:-12%;">' +
          drawSvgPet(av.svgPet, 0, 0) + '</svg>';
      }
      var emojiPet = '';
      if (av.pet && (!av.svgPet || av.svgPet === 'none')) {
        emojiPet = '<span style="position:absolute;bottom:5%;right:0;font-size:' + Math.round(w * 0.25) + 'px;">' + av.pet + '</span>';
      }
      return '<div style="position:relative;display:inline-block;width:' + w + 'px;height:' + h + 'px;">' +
        svgBody + petSvg + emojiPet + '</div>';
    }

      if (av.pet) return '<span class="av-badge av-pet">' + av.pet + '</span>';
      return '';

      return '<div class="' + cls + '"' + extra + '>' + buildAvatarSVG(p.avatar) + avatarPetBadge(p.avatar) + '</div>';

    // -----------------------------------
    // Navigation — single-source-of-truth.
    // -----------------------------------
    function showScreen(id) {
      var screens = document.querySelectorAll('.screen');
      for (var i = 0; i < screens.length; i++) {
        screens[i].classList.toggle('active', screens[i].id === id);
      }
      if (id === 's-home')      renderHome();
      if (id === 's-profiles')  renderProfiles();
      if (id === 's-play')      renderPlayHub();
      if (id === 's-sentences') renderSentencesScreen();
      if (id === 's-reading')   renderReadingScreen();
      if (id === 's-coins')     renderCoinsScreen();
      if (id === 's-askdad')    renderAskDadScreen();
      if (id === 's-wall')       renderWallScreen();
      if (id === 's-settings')   renderSettingsScreen();
      if (id === 's-avatarroom') renderAvatarRoom();
      if (id === 's-dadwrong')   renderDadWrongCard();
      if (id === 's-avdisplay') renderAvatarDisplay();
      if (id === 's-prep')       renderPrepHub();
      window.scrollTo(0, 0);
    }

    // Back-buttons & tile buttons wire up via data-attributes.
    document.addEventListener('click', function (ev) {
      var back = ev.target.closest('[data-back]');
      if (back) {
        showScreen(back.getAttribute('data-back'));
        return;
      }
      var go = ev.target.closest('[data-go]');
      if (go) {
        showScreen(go.getAttribute('data-go'));
        return;
      }
      if (ev.target.closest('#avatar-room-btn')) {
        showScreen('s-avatarroom');
      }
    });

    // -----------------------------------
    // Screen 1 — Profile select rendering & long-press rename.
    // -----------------------------------
    function renderProfiles() {
      var grid = $('profile-grid');
      var entryWrap = $('first-launch-entry');
      grid.innerHTML = '';
      entryWrap.innerHTML = '';

      var bothMissing = !state.profiles[0] && !state.profiles[1];

      if (bothMissing) {
        // First launch: ask for both names inline before showing the cards.
        renderFirstLaunch(entryWrap);
        return;
      }

      for (var i = 0; i < 2; i++) {
        grid.appendChild(buildProfileCard(i));
      }
    }

    function buildProfileCard(index) {
      var profile = state.profiles[index];
      var card = document.createElement('div');
      card.className = 'profile-card';
      card.setAttribute('role', 'button');
      card.setAttribute('tabindex', '0');

      if (profile) {
        card.innerHTML =
          avatarCircleHtml(profile, index) +
          '<div class="profile-name">' + escapeHtml(profile.name) + '</div>' +
          '<div class="profile-sub">🎮 ' + (profile.totalSessions || 0) + ' sessions</div>';
      } else {
        card.innerHTML =
          '<div class="avatar-circle ' + avatarClassFor(index) + '">+</div>' +
          '<div class="profile-name">Add player</div>' +
          '<div class="profile-sub">Tap to set up</div>';
      }

      attachProfileGestures(card, index);
      return card;
    }

    // Long-press detection (500ms) without blocking normal taps.
    function attachProfileGestures(card, index) {
      var pressTimer = null;
      var longFired = false;
      var LONG_MS = 500;

      function startPress() {
        longFired = false;
        clearTimeout(pressTimer);
        pressTimer = setTimeout(function () {
          longFired = true;
          if (state.profiles[index]) {
            promptRename(index);
          }
        }, LONG_MS);
      }
      function cancelPress() { clearTimeout(pressTimer); }
      function endPress(ev) {
        clearTimeout(pressTimer);
        if (longFired) { ev.preventDefault(); return; }
        handleProfileTap(index);
      }

      card.addEventListener('touchstart', startPress, { passive: true });
      card.addEventListener('touchend', endPress);
      card.addEventListener('touchcancel', cancelPress);
      card.addEventListener('touchmove', cancelPress, { passive: true });

      card.addEventListener('mousedown', startPress);
      card.addEventListener('mouseup', endPress);
      card.addEventListener('mouseleave', cancelPress);

      card.addEventListener('keydown', function (ev) {
        if (ev.key === 'Enter' || ev.key === ' ') {
          ev.preventDefault();
          handleProfileTap(index);
        }
      });
    }

    function handleProfileTap(index) {
      if (!state.profiles[index]) {
        // Empty slot — inline name entry.
        var name = window.prompt('What name should we use?');
        if (!name) return;
        name = name.trim();
        if (!name) return;
        state.profiles[index] = freshProfile(name);
        saveProfiles(state.profiles);
        renderProfiles();
        return;
      }
      state.activeIndex = index;
      showScreen('s-home');
    }

    function promptRename(index) {
      var current = state.profiles[index] ? state.profiles[index].name : '';
      var next = window.prompt('Rename player', current);
      if (next === null) return;
      next = next.trim();
      if (!next) return;
      state.profiles[index].name = next;
      saveProfiles(state.profiles);
      renderProfiles();
    }

    // First-launch flow — collect both names before the picker appears.
    function renderFirstLaunch(host) {
      host.innerHTML =
        '<div class="name-entry">' +
        '  <h3 class="center">Welcome! Let\'s set up two players.</h3>' +
        '  <input class="input" id="fl-name-1" placeholder="Player 1 name" maxlength="20" />' +
        '  <input class="input" id="fl-name-2" placeholder="Player 2 name" maxlength="20" />' +
        '  <button class="btn" id="fl-save">Start spelling →</button>' +
        '</div>';

      $('fl-save').addEventListener('click', function () {
        var n1 = ($('fl-name-1').value || '').trim();
        var n2 = ($('fl-name-2').value || '').trim();
        if (!n1 && !n2) {
          alert('Please enter at least one name.');
          return;
        }
        state.profiles[0] = n1 ? freshProfile(n1) : null;
        state.profiles[1] = n2 ? freshProfile(n2) : null;
        saveProfiles(state.profiles);
        renderProfiles();
      });
    }

    // -----------------------------------
    // Screen 2 — Home rendering (structure only; values from profile).
    // -----------------------------------
    function renderHome() {
      var p = state.profiles[state.activeIndex];
      if (!p) { showScreen('s-profiles'); return; }

      $('home-name').textContent = p.name;
      fillAvatarCircle($('home-avatar'), p);

      var econ = p.economy || {};
      $('home-coins').textContent = econ.coins || 0;
      $('home-gems').textContent  = econ.gems  || 0;

      var daily = econ.dailyCoins || 0;
      $('home-daily-coins').textContent = daily;
      var pct = Math.min(100, (daily / 20) * 100);
      $('home-progress').style.width = pct + '%';

      $('home-streak').textContent = p.totalSessions || 0;

      // Week dots populated from WEEKS array (Stage 2+).
      renderWeekDots();
      renderWeekBadge();

      // Drops area — stub. Real drop rendering arrives later.
      var dropsArea = $('drops-area');
      dropsArea.innerHTML = '';
      if (p.drops && p.drops.length > 0) {
        var badge = document.createElement('div');
        badge.className = 'drop-badge';
        badge.textContent = '🎁 ' + p.drops.length + ' new drop' + (p.drops.length > 1 ? 's' : '');
        dropsArea.appendChild(badge);
      }

      migrateAvatar(p);
      var unlockCount = p.avatar.unlocked.length;
      $('avatar-room-msg').textContent = unlockCount > 0
        ? unlockCount + ' item' + (unlockCount !== 1 ? 's' : '') + ' unlocked!'
        : 'Customise your look';
    }

    // -----------------------------------
    // Tiny HTML escaper for user-entered names.
    // -----------------------------------
    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, function (c) {
        return ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#39;'
        })[c];
      });
    }

    var WEEKS = [
      { weekKey: '2025-W01', label: 'Week 1',  title: 'Long A sounds', soundId: 'ai-ay-a_e',  emoji: '🐌', comingSoon: false },
