        saveActiveProfile();
        alert('Reading setting saved!');
      });

      // Coin cap
      var saveCap = $('sett-save-cap');
      if (saveCap) saveCap.addEventListener('click', function() {
        var val = parseInt(($('sett-cap') || {}).value, 10);
        if (!val || val < 5) { alert('Minimum daily cap is 5 coins.'); return; }
        if (!p.economy) p.economy = {};
        p.economy.dailyCap = val;
        saveActiveProfile();
        alert('Daily cap saved!');
      });

      // Custom word — update team options when sound changes
      var cwSound = $('cw-sound');
      if (cwSound) cwSound.addEventListener('change', function() {
        var sound = SOUNDS[cwSound.value];
        var teamSel = $('cw-team');
        if (teamSel && sound) {
          teamSel.innerHTML = (sound.teams || []).map(function(t) {
            return '<option value="' + escapeHtml(t) + '">' + escapeHtml(t) + '</option>';
          }).join('');
        }
      });

      // Add custom word
      var cwAdd = $('cw-add');
      if (cwAdd) cwAdd.addEventListener('click', function() {
        var word = ($('cw-word') ? $('cw-word').value : '').trim().toLowerCase();
        var hint = ($('cw-hint') ? $('cw-hint').value : '').trim();
        var sid  = $('cw-sound') ? $('cw-sound').value : '';
        var team = $('cw-team')  ? $('cw-team').value  : '';
        if (!word)        { alert('Please enter a word.'); return; }
        if (!sid || !team){ alert('Please select a sound set and team.'); return; }
        if (!p.customWords) p.customWords = [];
        if (p.customWords.find(function(cw) { return cw.w === word && cw.soundId === sid; })) {
          alert('That word is already in your list.'); return;
        }
        p.customWords.push({ w: word, team: team, soundId: sid, lv: 'core', hint: hint || word, ph: word + '?' });
        saveActiveProfile();
        renderSettingsScreen();
      });

      // Delete custom word
      $('s-settings').querySelectorAll('.del-btn[data-cw-index]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var idx = parseInt(btn.getAttribute('data-cw-index'), 10);
          if (!p.customWords || idx < 0 || idx >= p.customWords.length) return;
          if (!confirm('Delete "' + p.customWords[idx].w + '"?')) return;
          p.customWords.splice(idx, 1);
          saveActiveProfile();
          renderSettingsScreen();
        });
      });

      // Reading log link
      var goReading = $('go-reading-log');
      if (goReading) goReading.addEventListener('click', function() {
        readingTab = 'history';
        showScreen('s-reading');
      });

      // PIN management
      function startPinSetup(isChange) {
        var container = $('s-settings');
        var newPin = '';
        var step = isChange ? 'verify' : 'enter';

        function drawSetup() {
          var heading = step === 'verify' ? 'Verify current PIN' :
                        step === 'enter'  ? 'Choose a new 4-digit PIN' :
                                           'Confirm your PIN';
          container.innerHTML =
            '<button class="btn-back" data-back="s-home">← Back</button>' +
            '<div class="pin-overlay">' +
            '<div style="font-size:36px;">' + (step === 'verify' ? '🔒' : '🔑') + '</div>' +
            '<h2 style="margin:8px 0 0;">Settings PIN</h2>' +
            '<p style="color:var(--mut);font-size:14px;margin:4px 0 0;">' + heading + '</p>' +
            '<div class="pin-dots" id="pin-dots">' +
            [0,1,2,3].map(function(i) {
              return '<div class="pin-dot' + (i < newPin.length ? ' filled' : '') + '"></div>';
            }).join('') + '</div>' +
            '<div class="pin-keypad">' +
            [1,2,3,4,5,6,7,8,9].map(function(n) {
              return '<button class="pin-key" data-digit="' + n + '">' + n + '</button>';
            }).join('') +
            '<button class="pin-key" id="pin-del">⌫</button>' +
            '<button class="pin-key" data-digit="0">0</button>' +
            '</div></div>';

          container.querySelectorAll('[data-digit]').forEach(function(btn) {
            btn.addEventListener('click', function() {
              if (newPin.length < 4) {
                newPin += btn.getAttribute('data-digit');
                if (newPin.length === 4) handleFull();
                else drawSetup();
              }
            });
          });
          var del = $('pin-del');
          if (del) del.addEventListener('click', function() { newPin = newPin.slice(0,-1); drawSetup(); });
        }

        var firstEntry = '';
        function handleFull() {
          if (step === 'verify') {
            if (newPin !== getSettingsPin()) {
              newPin = ''; step = 'verify';
              drawSetup();
              var dots = container.querySelectorAll('.pin-dot');
              for (var i = 0; i < dots.length; i++) dots[i].className = 'pin-dot error';
              return;
            }
            newPin = ''; step = 'enter'; drawSetup();
          } else if (step === 'enter') {
            firstEntry = newPin; newPin = ''; step = 'confirm'; drawSetup();
          } else if (step === 'confirm') {
            if (newPin !== firstEntry) {
              newPin = ''; step = 'enter'; firstEntry = '';
              drawSetup();
              var dots2 = container.querySelectorAll('.pin-dot');
              for (var j = 0; j < dots2.length; j++) dots2[j].className = 'pin-dot error';
              return;
            }
            saveSettingsPin(newPin);
            settingsPinUnlocked = true;
            renderSettingsScreen();
          }
        }
        drawSetup();
      }

      var setPin = $('sett-set-pin');
      if (setPin) setPin.addEventListener('click', function() { startPinSetup(false); });

      var changePin = $('sett-change-pin');
      if (changePin) changePin.addEventListener('click', function() { startPinSetup(true); });

      var removePin = $('sett-remove-pin');
      if (removePin) removePin.addEventListener('click', function() {
        if (!confirm('Remove the settings PIN? Anyone will be able to access settings.')) return;
        saveSettingsPin('');
        renderSettingsScreen();
      });

      // Clear mistakes
      var clearMistakes = $('sett-clear-mistakes');
      if (clearMistakes) clearMistakes.addEventListener('click', function() {
        if (!confirm('Clear ' + p.name + '\'s problem words list?')) return;
        p.mistakes = [];
        saveActiveProfile();
        alert('Problem words cleared.');
      });

      // Reset ALL data — two-step confirmation
      var resetAll = $('sett-reset-all');
      if (resetAll) resetAll.addEventListener('click', function() {
        if (!confirm('This will delete ALL data for BOTH players. There is no undo. Continue?')) return;
        if (!confirm('Last chance — delete everything and start fresh?')) return;
        localStorage.removeItem(STORAGE_KEY);
        state.profiles = [null, null];
        state.activeIndex = null;
        showScreen('s-profiles');
      });
    }

    // -----------------------------------
    // Daddy Got It Wrong game
    // -----------------------------------

    var dadWrongSession = {
      soundId: null, words: [], index: 0,
      score: 0, coins: 0, attempts: 0
    };

    var DAD_RULES = [
      [/igh/g, 'i'],   [/ai/g, 'ae'],  [/ay/g, 'ai'],  [/ea/g, 'ie'],
      [/ee/g, 'ie'],   [/oa/g, 'oe'],  [/oi/g, 'oy'],  [/oo/g, 'u'],
      [/ou/g, 'ow'],   [/er/g, 'ur'],  [/ir/g, 'er'],  [/ur/g, 'ir'],
      [/aw/g, 'or'],   [/ck/g, 'k'],   [/ph/g, 'f'],   [/tch/g, 'ch'],
      [/tion/g, 'shun'], [/wh/g, 'w'], [/or(?=[^e])/g, 'aw']
    ];

    function makeDadMistake(word) {
      var w = word.toLowerCase();
      var rules = shuffle(DAD_RULES.slice());
      for (var i = 0; i < rules.length; i++) {
        var result = w.replace(rules[i][0], rules[i][1]);
        if (result !== w) return result;
      }
      // Fallback: duplicate a consonant in the middle
      var m = w.match(/^(.+?)([bcdfghjklmnpqrstvwxyz])(.+)$/i);
      if (m) return m[1] + m[2] + m[2] + m[3];
      return w + 'z';
    }

    function startDadWrongGame(soundId) {
      var p = activeProfile();
      if (!p) return;
      var sound = SOUNDS[soundId];
      if (!sound) return;
      var pool = selectWords(soundId, p.level || 'core', 8);
      if (!pool.length) { alert('No words for this sound set yet!'); return; }
      dadWrongSession = {
        soundId: soundId,
        words: pool.map(function(w) {
          return { correct: w.w, wrong: makeDadMistake(w.w), hint: w.hint || '', firstTry: false };
        }),
        index: 0, score: 0, coins: 0, attempts: 0
      };
      showScreen('s-dadwrong');
    }

    function renderDadWrongCard() {
      var container = $('s-dadwrong');
      if (!dadWrongSession.words.length) {
        container.innerHTML = '<button class="btn-back" data-back="s-play">← Back</button>' +
          '<p>No game loaded. Go back and pick a game!</p>';
        return;
      }
      if (dadWrongSession.index >= dadWrongSession.words.length) {
        showDadWrongDone();
        return;
      }
      var current = dadWrongSession.words[dadWrongSession.index];
      var total = dadWrongSession.words.length;
      var progress = dadWrongSession.index + 1;

      var hintHtml = current.hint
        ? '<div class="dw-hint">💡 ' + escapeHtml(current.hint) + '</div>'
        : '';

      container.innerHTML =
        '<button class="btn-back" data-back="s-play">← Back</button>' +
        '<div style="padding-bottom:24px;">' +
        '<div class="dad-progress">Word ' + progress + ' of ' + total + '</div>' +
        '<div class="progress-track"><div class="progress-fill" id="dw-progress" style="width:' +
          Math.round(((progress - 1) / total) * 100) + '%;"></div></div>' +
        '<div style="margin-top:20px;font-size:15px;font-weight:700;color:var(--pu3);">Dad typed…</div>' +
        '<div class="dad-bubble">' +
        '<div class="dad-wrong-word" id="dw-wrong">' + escapeHtml(current.wrong) + '</div>' +
        '</div>' +
        hintHtml +
        '<button class="btn btn-ghost dw-hear-btn" id="dw-hear" style="width:100%;margin:10px 0 14px;">🔊 Hear the word</button>' +
        '<div style="font-size:15px;font-weight:700;color:var(--txt);margin-bottom:10px;">What should it be? ✏️</div>' +
        '<input class="input" id="dw-input" type="text" autocomplete="off" autocorrect="off" ' +
          'autocapitalize="none" spellcheck="false" placeholder="Type the correct spelling…" />' +
        '<div class="dad-feedback" id="dw-feedback"></div>' +
        '<button class="btn" id="dw-check" style="width:100%;margin-top:14px;">Check ✓</button>' +
        '</div>';

      $('dw-hear').addEventListener('click', function() {
        speak(current.correct);
      });

      var input = $('dw-input');
      var feedback = $('dw-feedback');
      var checkBtn = $('dw-check');
      var attempts = 0;

      function check() {
        var val = (input.value || '').trim().toLowerCase();
        if (!val) { input.focus(); return; }
        dadWrongSession.attempts++;
        if (val === current.correct.toLowerCase()) {
          var firstTry = attempts === 0;
          current.firstTry = firstTry;
          if (firstTry) { dadWrongSession.score++; dadWrongSession.coins++; }
          feedback.style.color = 'var(--gn3)';
          feedback.textContent = firstTry ? '✅ You fixed it!' : '✅ Correct!';
          checkBtn.textContent = 'Next word →';
          checkBtn.removeEventListener('click', check);
          checkBtn.addEventListener('click', function next() {
            checkBtn.removeEventListener('click', next);
            dadWrongSession.index++;
            renderDadWrongCard();
          });
          input.disabled = true;
        } else {
          attempts++;
          feedback.style.color = 'var(--pk3)';
          feedback.textContent = attempts === 1 ? '❌ Not quite — try again!' : '❌ Hmm… think about the sound!';
          input.value = '';
          input.focus();
        }
      }

      checkBtn.addEventListener('click', check);
      input.addEventListener('keydown', function(e) {
        if (e.keyCode === 13) check();
      });
      input.focus();
    }

    function showDadWrongDone() {
      var p = activeProfile();
      var total = dadWrongSession.words.length;
      var score = dadWrongSession.score;
      var coinsEarned = dadWrongSession.coins;

      if (p && coinsEarned > 0) {
        var today = todayKey();
        if (p.economy.dailyDate !== today) { p.economy.dailyDate = today; p.economy.dailyCoins = 0; }
        var cap = getDailyCap(p);
        var awarded = Math.min(coinsEarned, Math.max(0, cap - (p.economy.dailyCoins || 0)));
        p.economy.coins       = (p.economy.coins       || 0) + awarded;
        p.economy.dailyCoins  = (p.economy.dailyCoins  || 0) + awarded;
        p.economy.totalEarned = (p.economy.totalEarned || 0) + awarded;
        p.economy.gems = Math.max(p.economy.gems || 0, Math.floor((p.economy.totalEarned || 0) / 50));
        if (awarded > 0) {
          p.coinHistory.push({ date: today, amount: awarded, soundId: dadWrongSession.soundId, source: 'dadwrong' });
        }
        updateStreak(p);
        saveActiveProfile();
        coinsEarned = awarded;
      }

      var stars = Math.min(5, score * 2);
      var emoji = score === total ? '🏆' : score >= total * 0.7 ? '🎉' : '💪';
      var msg   = score === total ? 'Perfect! Dad needs lessons from you!' :
                  score >= total * 0.7 ? 'Great work! You\'re a better speller than Dad!' :
                  'Good effort! Keep correcting Dad!';

      var container = $('s-dadwrong');
      container.innerHTML =
        '<button class="btn-back" data-back="s-play">← Back</button>' +
        '<div style="text-align:center;padding:20px 0;">' +
        '<div style="font-size:64px;">' + emoji + '</div>' +
        '<div class="done-stars" style="margin:8px 0;">' + starsHtml(stars) + '</div>' +
        '<h2 style="color:var(--pu3);">Dad corrected!</h2>' +
        '<p style="font-size:18px;font-weight:700;">' + score + ' of ' + total + ' fixed on first try</p>' +
        '<p style="color:var(--mut);">' + msg + '</p>' +
        (coinsEarned > 0 ? '<p style="color:var(--ye3);font-weight:800;font-size:18px;">🪙 +' + coinsEarned + ' coins!</p>' : '') +
        '<div style="margin-top:16px;background:rgba(255,255,255,0.9);border-radius:var(--radius-lg);padding:14px;">' +
        dadWrongSession.words.map(function(w) {
          return '<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(0,0,0,0.06);">' +
            '<span style="font-size:13px;color:var(--mut);">Dad wrote: <em>' + escapeHtml(w.wrong) + '</em></span>' +
            '<span style="font-weight:800;color:' + (w.firstTry ? 'var(--gn3)' : 'var(--pk3)') + ';">' +
            escapeHtml(w.correct) + ' ' + (w.firstTry ? '✅' : '📝') + '</span></div>';
        }).join('') +
        '</div>' +
        '<button class="btn" id="dw-again" style="width:100%;margin-top:16px;">Play again 🎲</button>' +
        '<button class="btn btn-secondary" id="dw-home" style="width:100%;margin-top:10px;">Back to home</button>' +
        '</div>';

      $('dw-again').addEventListener('click', function() { startDadWrongGame(dadWrongSession.soundId); });
      $('dw-home').addEventListener('click', function() { showScreen('s-home'); });
    }

    // -----------------------------------
    // Avatar Room
    // -----------------------------------
    var COLOUR_OPTIONS = [
      { key: 'pink',   label: 'Pink',   bg: 'linear-gradient(135deg,#FF85A1,#CC3060)' },
      { key: 'purple', label: 'Purple', bg: 'linear-gradient(135deg,#B07DE0,#7830B8)' },
      { key: 'blue',   label: 'Blue',   bg: 'linear-gradient(135deg,#5CB8E8,#2878B8)' },
      { key: 'teal',   label: 'Teal',   bg: 'linear-gradient(135deg,#40D8C8,#0A8070)' },
      { key: 'green',  label: 'Green',  bg: 'linear-gradient(135deg,#3CB87A,#1A6840)' },
      { key: 'yellow', label: 'Yellow', bg: 'linear-gradient(135deg,#FFD740,#E07A00)' },
      { key: 'orange', label: 'Orange', bg: 'linear-gradient(135deg,#FFB347,#D44000)' },
      { key: 'red',    label: 'Red',    bg: 'linear-gradient(135deg,#FF7070,#B81818)' }
    ];

    function renderAvatarRoom() {
      var p = activeProfile();
      if (!p) { showScreen('s-profiles'); return; }
      migrateAvatar(p);

      var tabs = ['look', 'clothes', 'items', 'pet', 'shop'];
      var tabLabels = { look: '🎨 Look', clothes: '👗 Clothes', items: '👑 Items', pet: '🐶 Pets', shop: '💎 Shop' };

      var tabHtml = tabs.map(function(t) {
        return '<button class="ar-tab' + (avatarRoomTab === t ? ' active' : '') +
          '" data-tab="' + t + '">' + tabLabels[t] + '</button>';
      }).join('');

      var panelHtml = '';

      if (avatarRoomTab === 'look') {
        var genderHtml = '<div class="ar-section-title">Gender</div>' +
          '<div class="ar-choice-row">' +
          '<button class="ar-choice-btn' + (p.avatar.gender === 'girl' ? ' selected' : '') +
            '" data-field="gender" data-val="girl">👧 Girl</button>' +
          '<button class="ar-choice-btn' + (p.avatar.gender === 'boy' ? ' selected' : '') +
            '" data-field="gender" data-val="boy">👦 Boy</button>' +
          '</div>';

        var skinHtml = '<div class="ar-section-title">Skin Tone</div><div class="ar-swatch-row">' +
          SKIN_TONES.map(function(s) {
            return '<button class="ar-swatch' + (p.avatar.skinKey === s.key ? ' selected' : '') +
              '" data-field="skinKey" data-val="' + s.key +
              '" style="background:' + s.hex + ';" aria-label="' + s.label + '"></button>';
          }).join('') + '</div>';

        var hairStyleHtml = '<div class="ar-section-title">Hair Style</div><div class="ar-style-grid">' +
          HAIR_STYLES.map(function(hs) {
            return '<button class="ar-style-btn' + (p.avatar.hairStyle === hs.key ? ' selected' : '') +
              '" data-field="hairStyle" data-val="' + hs.key + '">' + hs.label + '</button>';
          }).join('') + '</div>';

        var hairColHtml = '<div class="ar-section-title">Hair Colour</div><div class="ar-swatch-row">' +
          HAIR_COLOURS.map(function(c) {
            return '<button class="ar-swatch' + (p.avatar.hairColour === c.key ? ' selected' : '') +
              '" data-field="hairColour" data-val="' + c.key +
              '" style="background:' + c.hex + ';" aria-label="' + c.label + '"></button>';
          }).join('') + '</div>';

        var eyeColHtml = '<div class="ar-section-title">Eye Colour</div><div class="ar-swatch-row">' +
          EYE_COLOURS.map(function(c) {
            return '<button class="ar-swatch' + (p.avatar.eyeColour === c.key ? ' selected' : '') +
              '" data-field="eyeColour" data-val="' + c.key +
              '" style="background:' + c.hex + ';" aria-label="' + c.label + '"></button>';
          }).join('') + '</div>';

        panelHtml = genderHtml + skinHtml + hairStyleHtml + hairColHtml + eyeColHtml;

      } else if (avatarRoomTab === 'clothes') {
        panelHtml = '<div class="ar-section-title">Shirt Colour</div><div class="ar-swatch-row">' +
          SHIRT_COLOURS.map(function(c) {
            return '<button class="ar-swatch' + (p.avatar.shirtColour === c.key ? ' selected' : '') +
              '" data-field="shirtColour" data-val="' + c.key +
              '" style="background:' + c.hex + ';" aria-label="' + c.label + '"></button>';
          }).join('') + '</div>';

      } else if (avatarRoomTab === 'shop') {
        var gems = (p.economy && p.economy.gems) || 0;
        var GEM_PRICE = 5;
        panelHtml = '<div class="ar-gem-balance"><span style="font-size:22px;">💎</span>' +
          '<div><div class="ar-gem-count">' + gems + ' gems</div>' +
          '<div class="ar-gem-label">Earn 1 gem every 50 coins · items cost ' + GEM_PRICE + ' gems</div></div></div>';
        var shopCats = [
          { title: 'Hats', items: wearablesByCat('hat') },
          { title: 'Hair Accessories', items: wearablesByCat('hairAcc') },
          { title: 'Outfits', items: wearablesByCat('outfit') },
          { title: 'Bags', items: wearablesByCat('bag') }
        ];
        shopCats.forEach(function(cat) {
          panelHtml += '<div class="ar-section-title">' + cat.title + '</div><div class="ar-shop-grid">';
          cat.items.forEach(function(w) {
            var owned = p.avatar.unlocked.indexOf(w.key) !== -1;
            var canBuy = !owned && gems >= GEM_PRICE;
            var cls = 'ar-shop-btn' + (owned ? ' owned' : (canBuy ? '' : ' cant-afford'));
            var priceLabel = owned ? '<span class="ar-shop-price owned-lbl">✓ owned</span>'
              : '<span class="ar-shop-price">💎' + GEM_PRICE + '</span>';
            panelHtml += '<button class="' + cls + '" data-shop-item="' + w.key + '" data-owned="' + (owned ? '1' : '0') + '">' +
              w.icon + '<div style="font-size:9px;line-height:1.1;margin-top:1px;">' + w.label + '</div>' + priceLabel + '</button>';
          });
          panelHtml += '</div>';
        });
        panelHtml += '<div class="ar-section-title">Pets</div><div class="ar-shop-grid">' +
          AVATAR_PETS.map(function(item) {
            var owned = p.avatar.unlocked.indexOf(item) !== -1;
            var canBuy = !owned && gems >= GEM_PRICE;
            var cls = 'ar-shop-btn' + (owned ? ' owned' : (canBuy ? '' : ' cant-afford'));
            var priceLabel = owned ? '<span class="ar-shop-price owned-lbl">✓ owned</span>'
              : '<span class="ar-shop-price">💎' + GEM_PRICE + '</span>';
            return '<button class="' + cls + '" data-shop-item="' + item + '" data-owned="' + (owned ? '1' : '0') + '">' +
              item + priceLabel + '</button>';
          }).join('') + '</div>';

      } else if (avatarRoomTab === 'items') {
        var wearCats = [
          { title: 'Hats', cat: 'hat', slot: 'hat' },
          { title: 'Hair Accessories', cat: 'hairAcc', slot: 'hairAcc' },
          { title: 'Outfits', cat: 'outfit', slot: 'outfit' },
          { title: 'Bags', cat: 'bag', slot: 'bag' }
        ];
        panelHtml = '<div class="ar-item-hint">🎁 Play games to earn drops or buy in the shop!</div>';
        wearCats.forEach(function(wc) {
          var items = wearablesByCat(wc.cat);
          var currentVal = p.avatar[wc.slot];
          panelHtml += '<div class="ar-section-title">' + wc.title + '</div><div class="ar-item-grid" style="margin-top:4px;">';
          items.forEach(function(w) {
            var isUnlocked = p.avatar.unlocked.indexOf(w.key) !== -1;
            var isSelected = currentVal === w.key;
            var btnCls = 'ar-item-btn' + (isSelected ? ' selected' : '') + (isUnlocked ? '' : ' locked');
            panelHtml += '<button class="' + btnCls + '" data-wear="' + w.key + '" data-slot="' + wc.slot +
              '" data-unlocked="' + (isUnlocked ? '1' : '0') + '" style="flex-direction:column;font-size:22px;">' +
              w.icon + '<div style="font-size:9px;line-height:1;">' + w.label + '</div>' +
              (isUnlocked ? '' : '<span class="ar-lock">🔒</span>') + '</button>';
          });
          panelHtml += '</div>';
        });

      } else {
        var currentPet = p.avatar.pet;
        var petBtns = AVATAR_PETS.map(function(item) {
          var isUnlocked = p.avatar.unlocked.indexOf(item) !== -1;
          var isSelected = currentPet === item;
          var btnCls = 'ar-item-btn' + (isSelected ? ' selected' : '') + (isUnlocked ? '' : ' locked');
          return '<button class="' + btnCls + '" data-item="' + item +
            '" data-unlocked="' + (isUnlocked ? '1' : '0') + '">' +
            item + (isUnlocked ? '' : '<span class="ar-lock">🔒</span>') + '</button>';
        }).join('');
        var clearPet = currentPet
          ? '<button class="btn btn-ghost" id="ar-clear-slot" style="width:100%;margin-top:12px;">Remove Pet</button>'
          : '';
        panelHtml = '<div class="ar-item-hint">🎁 Play games to earn drops and unlock!</div>' +
          '<div class="ar-item-grid" style="margin-top:10px;">' + petBtns + '</div>' + clearPet;
      }

      var container = $('s-avatarroom');
      container.innerHTML =
        '<button class="btn-back" data-back="s-home">← Back</button>' +
        '<h2 style="margin-bottom:12px;">Avatar Room 🎨</h2>' +
        '<div class="avatar-preview-wrap">' +
        '<div style="width:120px;height:180px;">' + buildFullBodySVG(p.avatar) + '</div>' +
        (p.avatar.pet ? '<span style="font-size:32px;margin-top:-16px;">' + p.avatar.pet + '</span>' : '') +
        '<div style="font-size:17px;font-weight:800;color:var(--pu3);margin-top:4px;">' + escapeHtml(p.name) + '</div>' +
        '</div>' +
        '<div class="ar-tabs">' + tabHtml + '</div>' +
        '<div class="ar-panel">' + panelHtml + '</div>';

      container.querySelectorAll('.ar-tab').forEach(function(btn) {
        btn.addEventListener('click', function() {
          avatarRoomTab = btn.getAttribute('data-tab');
          renderAvatarRoom();
        });
      });

      container.querySelectorAll('[data-field]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          p.avatar[btn.getAttribute('data-field')] = btn.getAttribute('data-val');
          saveActiveProfile();
          renderAvatarRoom();
        });
      });

      container.querySelectorAll('[data-shop-item]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          if (btn.getAttribute('data-owned') === '1') return;
          var item = btn.getAttribute('data-shop-item');
          var gems = (p.economy && p.economy.gems) || 0;
          var GEM_PRICE = 5;
          if (gems < GEM_PRICE) {
            alert('You need ' + GEM_PRICE + ' 💎 gems to buy this! Keep playing to earn more coins → gems.');
            return;
          }
          var wb = wearableByKey(item);
          var displayName = wb ? wb.icon + ' ' + wb.label : item;
          if (!window.confirm('Buy ' + displayName + ' for ' + GEM_PRICE + ' gems?')) return;
          if (!p.economy) p.economy = {};
          p.economy.gems = (p.economy.gems || 0) - GEM_PRICE;
          if (p.avatar.unlocked.indexOf(item) === -1) p.avatar.unlocked.push(item);
          if (wb) {
            if (wb.cat === 'hat') p.avatar.hat = item;
            else if (wb.cat === 'hairAcc') p.avatar.hairAcc = item;
            else if (wb.cat === 'outfit') p.avatar.outfit = item;
            else if (wb.cat === 'bag') p.avatar.bag = item;
          } else if (AVATAR_PETS.indexOf(item) !== -1) {
            p.avatar.pet = item;
          }
          saveActiveProfile();
          renderAvatarRoom();
        });
      });

      container.querySelectorAll('[data-wear]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          if (btn.getAttribute('data-unlocked') === '0') {
            alert('Play games to earn drops and unlock this item! 🎁');
            return;
          }
          var key = btn.getAttribute('data-wear');
          var slot = btn.getAttribute('data-slot');
          p.avatar[slot] = (p.avatar[slot] === key) ? null : key;
          saveActiveProfile();
          renderAvatarRoom();
        });
      });

      container.querySelectorAll('.ar-item-btn[data-item]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          if (btn.getAttribute('data-unlocked') === '0') {
            alert('Play games to earn drops and unlock this item! 🎁');
            return;
          }
          var item = btn.getAttribute('data-item');
          p.avatar.pet = (p.avatar.pet === item) ? null : item;
          saveActiveProfile();
          renderAvatarRoom();
        });
      });

      var clearSlotBtn = $('ar-clear-slot');
      if (clearSlotBtn) {
        clearSlotBtn.addEventListener('click', function() {
          p.avatar.pet = null;
          saveActiveProfile();
          renderAvatarRoom();
        });
      }
    }

    // -----------------------------------
    // Boot
    // -----------------------------------
    showScreen('s-profiles');
  </script>
</body>
</html>
